<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOKERINDO PRO | Smart Career Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #0a0a0c; --glass: rgba(18, 18, 23, 0.85);
            --card: #16161e; --border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1; --primary-glow: rgba(99, 102, 241, 0.3);
            --accent: #10b981; --text: #ffffff; --text-dim: #94a3b8;
            --radius: 20px;
        }
        [data-theme="light"] {
            --bg: #f8fafc; --glass: rgba(255, 255, 255, 0.85);
            --card: #ffffff; --border: rgba(0, 0, 0, 0.05);
            --text: #0f172a; --text-dim: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; transition: 0.4s; min-height: 100vh; }

        header {
            position: sticky; top: 0; z-index: 1000; background: var(--glass); 
            backdrop-filter: blur(15px); padding: 1rem 8%; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        .logo { cursor: pointer; user-select: none; }
        .logo h1 { font-weight: 800; font-size: 1.5rem; background: linear-gradient(90deg, var(--primary), #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* USER INTERFACE */
        .hero { padding: 4rem 8% 2rem; text-align: center; background: radial-gradient(circle at top right, var(--primary-glow), transparent); }
        .search-container { 
            display: flex; background: var(--card); padding: 8px; border-radius: 100px;
            border: 1px solid var(--border); max-width: 900px; margin: 0 auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .search-container input { flex: 1; background: transparent; border: none; padding: 15px 25px; color: var(--text); outline: none; font-size: 1rem; }
        .search-container .divider { width: 1px; background: var(--border); margin: 10px 0; }
        .btn-search { background: var(--primary); color: white; border: none; padding: 0 35px; border-radius: 100px; font-weight: 700; cursor: pointer; transition: 0.3s; }

        .loker-grid { padding: 3rem 8% 5rem; display: grid; gap: 2rem; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        .job-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 24px; 
            padding: 2rem; position: relative; transition: 0.4s; display: flex; flex-direction: column;
        }
        .job-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 20px 40px -15px var(--primary-glow); }
        .job-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 5px; }
        .job-salary { font-size: 1rem; color: var(--accent); font-weight: 700; margin-bottom: 15px; }

        /* ADMIN INTERFACE */
        .admin-panel { background: var(--card); border: 1px solid var(--primary); border-radius: var(--radius); padding: 2rem; margin: 2rem 8%; display: none; box-shadow: 0 0 30px var(--primary-glow); }
        .admin-nav { display: flex; gap: 15px; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        .nav-link { cursor: pointer; color: var(--text-dim); font-weight: 600; padding: 8px 15px; border-radius: 10px; }
        .nav-link.active { color: var(--primary); background: rgba(99, 102, 241, 0.1); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.2rem; }
        .stat-item { background: var(--bg); padding: 1.5rem; border-radius: 18px; text-align: center; border: 1px solid var(--border); }
        .stat-item h3 { font-size: 2.2rem; color: var(--primary); margin: 5px 0; }

        .admin-table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
        .admin-table th, .admin-table td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }

        /* MODAL & AI ASISTEN */
        .modal { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); padding: 2rem; }
        .modal-content { background: var(--card); max-width: 800px; margin: auto; border-radius: 24px; padding: 2.5rem; border: 1px solid var(--border); overflow-y: auto; max-height: 90vh; }
        .ai-assistant { background: rgba(99, 102, 241, 0.05); border: 2px dashed var(--primary); padding: 1.5rem; border-radius: 18px; margin-bottom: 1.5rem; position: relative; }
        .input-box { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: var(--text); outline: none; margin-bottom: 12px; transition: 0.3s; }
        .input-box:focus { border-color: var(--primary); }

        .btn { padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-wa { background: #22c55e; color: white; margin-top: auto; text-decoration: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        
        .hidden { display: none !important; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.05); } }
        @media (max-width: 768px) {
            .search-container { flex-direction: column; border-radius: 20px; padding: 15px; }
            .search-container .divider { display: none; }
            .admin-panel { margin: 1rem 3%; padding: 1rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="adminCounter()">
        <h1>LOKERINDO.PRO</h1>
    </div>
    <button class="btn btn-outline" onclick="toggleTheme()">🌓 Mode</button>
</header>

<div id="userView">
    <div class="hero">
        <h2>Temukan Karir Impianmu</h2>
        <p>Portal lowongan kerja terupdate di seluruh Indonesia</p>
        <div class="search-container">
            <input type="text" id="searchJob" placeholder="Posisi Pekerjaan...">
            <div class="divider"></div>
            <input type="text" id="searchLoc" placeholder="Lokasi...">
            <button class="btn-search" onclick="app.search()">Cari</button>
        </div>
    </div>
    <main id="lokerGrid" class="loker-grid"></main>
</div>

<!-- DASHBOARD ADMIN AREA -->
<div id="adminArea" class="admin-panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h2>🔐 Management Dashboard</h2>
        <button class="btn btn-outline" style="color: var(--danger)" onclick="logout()">Logout</button>
    </div>

    <div class="admin-nav">
        <div class="nav-link active" onclick="switchTab('stats')">Analytics</div>
        <div class="nav-link" onclick="switchTab('manage')">Manajemen Loker</div>
    </div>

    <!-- Tab Statistik -->
    <div id="tab-stats" class="admin-tab">
        <div class="stats-grid">
            <div class="stat-item"><p>Total Jobs</p><h3 id="countJobs">0</h3></div>
            <div class="stat-item"><p>Total Visitors</p><h3 id="countVisitors">0</h3></div>
            <div class="stat-item"><p>WA Clicks</p><h3 id="countClicks">0</h3></div>
        </div>
    </div>

    <!-- Tab Manajemen -->
    <div id="tab-manage" class="admin-tab hidden">
        <button class="btn btn-primary" onclick="openModal()">+ Tambah Loker Baru</button>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Posisi</th>
                    <th>Perusahaan</th>
                    <th>Klik</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="adminTableBody"></tbody>
        </table>
    </div>
</div>

<!-- MODAL FORM + AI ASSISTANT -->
<div id="jobModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Tambah Lowongan Kerja</h3><br>
        
        <!-- NEURAL AI ASISTEN -->
        <div class="ai-assistant">
            <label style="font-size: 0.8rem; font-weight: 800; color: var(--primary)">🤖 NEURAL AI FORMATTER (PASTE DISINI)</label>
            <textarea id="aiRaw" class="input-box" rows="3" style="margin-top:8px" placeholder="Contoh: Admin butuh di PT Maju Gaji 5jt Lokasi Jakarta hub wa 0812..."></textarea>
            <button class="btn btn-primary" style="width: 100%;" onclick="app.aiProcess()">✨ Rapikan & Isi Otomatis</button>
        </div>

        <input type="hidden" id="fId">
        <input type="text" id="fPos" class="input-box" placeholder="Posisi Pekerjaan">
        <input type="text" id="fComp" class="input-box" placeholder="Nama Perusahaan">
        <input type="number" id="fSalary" class="input-box" placeholder="Nominal Gaji (Angka saja)">
        <input type="text" id="fLoc" class="input-box" placeholder="Lokasi">
        <input type="text" id="fWA" class="input-box" placeholder="WhatsApp (62...)">
        <textarea id="fDesc" class="input-box" rows="6" placeholder="Deskripsi Pekerjaan Rapi"></textarea>
        
        <div style="display: flex; gap: 10px; margin-top: 1rem;">
            <button class="btn btn-primary" style="flex: 2" onclick="app.save()">Simpan Data</button>
            <button class="btn btn-outline" style="flex: 1" onclick="closeModal()">Batal</button>
        </div>
    </div>
</div>

<script>
let isAdmin = false;
const ADS_LINK = "https://tuxedoarbourannouncement.com/zhtirhypu?key=cc7341e331408d30ccf349b5b9539d67";

const app = {
    db: JSON.parse(localStorage.getItem('loker_v6_db')) || [
        { id: 1, pos: "Senior Web Developer", comp: "Tech Global Hub", sal: 12000000, loc: "Jakarta", wa: "62812345678", time: Date.now(), desc: "• Menguasai React & Node.js\n• Pengalaman minimal 3 tahun\n• Gaji Kompetitif" }
    ],
    stats: JSON.parse(localStorage.getItem('loker_v6_stats')) || { visitors: 0, clicks: 0 },
    adsState: {},

    init() {
        this.trackVisitor();
        this.render();
    },

    trackVisitor() {
        if (!sessionStorage.getItem('visited')) {
            this.stats.visitors++;
            sessionStorage.setItem('visited', 'true');
            this.saveStats();
        }
    },

    saveStats() { localStorage.setItem('loker_v6_stats', JSON.stringify(this.stats)); },

    formatRp(num) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num); },

    // ASISTEN AI RASA NEURAL
    aiProcess() {
        const raw = document.getElementById('aiRaw').value;
        if(!raw) return alert("Paste teks berantakan lu dulu!");

        // Deteksi Judul
        const posMatch = raw.match(/(?:butuh|dicari|loker|posisi)\s+([^,\n\r]+)/i);
        if(posMatch) document.getElementById('fPos').value = posMatch[1].trim().toUpperCase();

        // Deteksi Gaji (Regex mencari pola angka jutaan atau 'jt')
        const salMatch = raw.match(/(?:gaji|sal|upah|fee)\s*([\d.]+)/i);
        if(salMatch) document.getElementById('fSalary').value = salMatch[1].replace(/\./g, '');

        // Deteksi WA
        const waMatch = raw.match(/(?:wa|hub|kontak|no)\s*(\d{10,14})/i);
        if(waMatch) {
            let num = waMatch[1];
            document.getElementById('fWA').value = num.startsWith('0') ? '62' + num.substring(1) : num;
        }

        // Neural Text Formatter (Benerin spasi & tanda baca)
        let cleanDesc = raw.trim()
            .replace(/\s\s+/g, ' ') 
            .replace(/([.!?])\s*(?=[A-Z])/g, "$1\n• ") 
            .replace(/(?:syarat|kualifikasi|deskripsi|jobdesk):?/gi, "\n\nKualifikasi:\n• ");
        
        document.getElementById('fDesc').value = cleanDesc;
        alert("🪄 AI Berhasil Merapikan Teks!");
    },

    render(data = this.db) {
        const grid = document.getElementById('lokerGrid');
        grid.innerHTML = "";
        data.forEach((item) => {
            const hasAds = this.adsState[item.id] || false;
            grid.innerHTML += `
                <div class="job-card">
                    <div class="job-title">${item.pos}</div>
                    <div style="color:var(--text-dim); font-size:0.9rem; margin-bottom:5px;">🏢 ${item.comp} • 📍 ${item.loc}</div>
                    <div class="job-salary">💰 ${this.formatRp(item.sal || 0)}</div>
                    <div style="font-size:0.85rem; color:var(--text-dim); margin-bottom:15px; white-space:pre-line;">${item.desc.substring(0, 150)}...</div>
                    <button class="btn btn-wa ${hasAds ? 'ads-pending' : ''}" 
                            onclick="app.handleApply('${item.id}', '${item.wa}', '${item.pos}')">
                        ${hasAds ? 'Lanjut ke WhatsApp' : 'Lamar Sekarang'}
                    </button>
                </div>`;
        });

        if(isAdmin) {
            document.getElementById('countJobs').innerText = this.db.length;
            document.getElementById('countVisitors').innerText = this.stats.visitors;
            document.getElementById('countClicks').innerText = this.stats.clicks;
            
            const table = document.getElementById('adminTableBody');
            table.innerHTML = this.db.map(l => `
                <tr>
                    <td>${l.pos}</td>
                    <td>${l.comp}</td>
                    <td>${l.clicks || 0}</td>
                    <td>
                        <button onclick="app.edit('${l.id}')" style="color:var(--primary); background:none; border:none; cursor:pointer">Edit</button> | 
                        <button onclick="app.delete('${l.id}')" style="color:red; background:none; border:none; cursor:pointer">Hapus</button>
                    </td>
                </tr>
            `).join('');
        }
    },

    handleApply(id, wa, pos) {
        if (!this.adsState[id]) {
            window.open(ADS_LINK, '_blank');
            this.adsState[id] = true;
            this.render();
        } else {
            window.open(`https://wa.me/${wa}?text=Halo%20saya%20tertarik%20melamar%20${encodeURIComponent(pos)}`, '_blank');
            const idx = this.db.findIndex(x => x.id == id);
            this.db[idx].clicks = (this.db[idx].clicks || 0) + 1;
            this.stats.clicks++;
            this.saveStats();
            localStorage.setItem('loker_v6_db', JSON.stringify(this.db));
        }
    },

    search() {
        const qJob = document.getElementById('searchJob').value.toLowerCase();
        const qLoc = document.getElementById('searchLoc').value.toLowerCase();
        const res = this.db.filter(i => i.pos.toLowerCase().includes(qJob) && i.loc.toLowerCase().includes(qLoc));
        this.render(res);
    },

    save() {
        const id = document.getElementById('fId').value;
        const newItem = {
            id: id || Date.now(),
            pos: document.getElementById('fPos').value,
            comp: document.getElementById('fComp').value,
            sal: parseInt(document.getElementById('fSalary').value) || 0,
            loc: document.getElementById('fLoc').value,
            wa: document.getElementById('fWA').value,
            desc: document.getElementById('fDesc').value,
            time: Date.now(),
            clicks: id ? this.db.find(x => x.id == id).clicks : 0
        };

        if(id) {
            const index = this.db.findIndex(x => x.id == id);
            this.db[index] = newItem;
        } else {
            this.db.unshift(newItem);
        }

        localStorage.setItem('loker_v6_db', JSON.stringify(this.db));
        closeModal();
        this.render();
    },

    edit(id) {
        const l = this.db.find(x => x.id == id);
        document.getElementById('modalTitle').innerText = "Edit Lowongan Kerja";
        document.getElementById('fId').value = l.id;
        document.getElementById('fPos').value = l.pos;
        document.getElementById('fComp').value = l.comp;
        document.getElementById('fSalary').value = l.sal;
        document.getElementById('fLoc').value = l.loc;
        document.getElementById('fWA').value = l.wa;
        document.getElementById('fDesc').value = l.desc;
        openModal();
    },

    delete(id) {
        if(confirm("Hapus loker ini permanen?")) {
            this.db = this.db.filter(x => x.id != id);
            localStorage.setItem('loker_v6_db', JSON.stringify(this.db));
            this.render();
        }
    }
};

function switchTab(tab) {
    document.querySelectorAll('.admin-tab').forEach(el => el.classList.add('hidden'));
    document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.remove('hidden');
    event.target.classList.add('active');
}

let clickCount = 0;
function adminCounter() {
    clickCount++;
    if(clickCount === 9) {
        if(prompt("Admin Access:") === "admin123") {
            isAdmin = true;
            document.getElementById('adminArea').style.display = 'block';
            document.getElementById('userView').style.display = 'none';
            app.render();
        }
        clickCount = 0;
    }
}

function logout() { location.reload(); }
function openModal() { document.getElementById('jobModal').style.display = 'block'; }
function closeModal() { 
    document.getElementById('jobModal').style.display = 'none'; 
    document.getElementById('fId').value = "";
    document.querySelectorAll('.modal input, .modal textarea').forEach(i => i.value = "");
}
function toggleTheme() {
    const b = document.documentElement;
    b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOKERINDO PRO | Professional Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c; --card: #16161e; --border: rgba(255,255,255,0.08);
            --primary: #6366f1; --accent: #10b981; --text: #ffffff;
            --text-dim: #94a3b8; --radius: 20px; --kuning: #fbbf24;
        }
        [data-theme="light"] {
            --bg: #f8fafc; --card: #ffffff; --border: rgba(0,0,0,0.05);
            --text: #0f172a; --text-dim: #475569;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }

        /* HEADER */
        header {
            position: sticky; top: 0; z-index: 1000; background: rgba(10,10,12,0.8); 
            backdrop-filter: blur(15px); padding: 1rem 8%; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        .logo h1 { font-weight: 800; font-size: 1.5rem; background: linear-gradient(90deg, var(--primary), #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }

        /* HERO */
        .hero { padding: 4rem 8% 2rem; text-align: center; }
        .search-container { 
            display: flex; background: var(--card); padding: 8px; border-radius: 100px;
            border: 1px solid var(--border); max-width: 850px; margin: 2rem auto;
        }
        .search-container input { flex: 1; background: transparent; border: none; padding: 15px 25px; color: var(--text); outline: none; }
        .btn-search { background: var(--primary); color: white; border: none; padding: 0 35px; border-radius: 100px; font-weight: 700; cursor: pointer; }

        /* GRID */
        .loker-grid { padding: 1rem 8% 5rem; display: grid; gap: 2rem; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        .job-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 28px; 
            padding: 2rem; display: flex; flex-direction: column; min-height: 480px; transition: 0.4s;
        }
        .job-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .job-salary { font-size: 1.1rem; color: var(--accent); font-weight: 800; margin: 15px 0; }
        .desc-wrapper { flex-grow: 1; font-size: 0.9rem; color: var(--text-dim); line-height: 1.6; margin-bottom: 20px; overflow: hidden; }
        .desc-text.collapsed { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        .btn-wa { 
            background: var(--kuning); color: #000; padding: 16px; border-radius: 50px; font-weight: 800;
            text-decoration: none; text-align: center; transition: 0.3s;
        }
        .btn-wa:hover { transform: scale(1.03); }

        /* ADMIN */
        #adminArea { display: none; padding: 2rem 5%; }
        .admin-box { background: var(--card); border: 1px solid var(--primary); border-radius: 30px; padding: 2.5rem; max-width: 1200px; margin: 0 auto; }
        .admin-nav { display: flex; gap: 10px; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        .nav-link { cursor: pointer; padding: 10px 20px; border-radius: 10px; font-weight: 700; color: var(--text-dim); }
        .nav-link.active { background: var(--primary); color: white; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-item { background: var(--bg); padding: 1.5rem; border-radius: 15px; border: 1px solid var(--border); text-align: center; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; z-index: 5000; background: rgba(0,0,0,0.9); padding: 2rem; overflow-y: auto; }
        .modal-content { background: var(--card); max-width: 800px; margin: auto; border-radius: 30px; padding: 2.5rem; }
        .input-box { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: var(--text); outline: none; margin-bottom: 15px; }
        .btn { padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; }
        .btn-primary { background: var(--primary); color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="adminCounter()"><h1>LOKERINDO.PRO</h1></div>
    <button class="btn" style="border:1px solid var(--border); color:white" onclick="toggleTheme()">🌓</button>
</header>

<div id="userView">
    <div class="hero">
        <h2 style="font-size: 2.5rem;">Cari Lowongan Kerja</h2>
        <div class="search-container">
            <input type="text" id="sJob" placeholder="Posisi...">
            <input type="text" id="sLoc" placeholder="Lokasi...">
            <button class="btn-search" onclick="searchJobs()">Cari</button>
        </div>
    </div>
    <div id="lokerGrid" class="loker-grid"></div>
</div>

<div id="adminArea">
    <div class="admin-box">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h2>Admin Dashboard</h2>
            <button class="btn" style="color:red" onclick="location.reload()">Logout</button>
        </div>
        <div class="admin-nav">
            <div id="n-stats" class="nav-link active" onclick="switchTab('stats')">Statistik</div>
            <div id="n-manage" class="nav-link" onclick="switchTab('manage')">Manajemen</div>
        </div>
        <div id="t-stats">
            <div class="stats-grid">
                <div class="stat-item"><p>Total Loker</p><h3 id="cJobs">0</h3></div>
                <div class="stat-item"><p>Klik WA</p><h3 id="cClicks">0</h3></div>
            </div>
        </div>
        <div id="t-manage" class="hidden">
            <button class="btn btn-primary" onclick="openModal()">+ Loker Baru</button>
            <table style="width:100%; margin-top:20px; text-align:left;">
                <thead><tr><th>Posisi</th><th>Klik</th><th>Aksi</th></tr></thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="jobModal" class="modal">
    <div class="modal-content">
        <h3>Post Vacancy</h3><br>
        <div style="background:rgba(99,102,241,0.1); padding:15px; border-radius:15px; margin-bottom:15px;">
            <p style="font-size:0.8rem; font-weight:800; color:var(--primary)">🤖 AI AUTO-FILL</p>
            <textarea id="aiRaw" class="input-box" rows="3" placeholder="Paste teks mentah loker disini..."></textarea>
            <button class="btn btn-primary" style="width:100%" onclick="runAI()">✨ Analisis Teks</button>
        </div>
        <input type="hidden" id="fId">
        <input type="text" id="fPos" class="input-box" placeholder="Posisi Pekerjaan">
        <input type="text" id="fComp" class="input-box" placeholder="Nama Perusahaan">
        <input type="number" id="fSalary" class="input-box" placeholder="Gaji">
        <input type="text" id="fLoc" class="input-box" placeholder="Lokasi Lengkap">
        <input type="text" id="fWA" class="input-box" placeholder="WhatsApp (62...)">
        <textarea id="fDesc" class="input-box" rows="4" placeholder="Deskripsi"></textarea>
        <button class="btn btn-primary" style="width:100%" onclick="saveJob()">Simpan Loker</button>
        <button class="btn" style="width:100%; margin-top:10px; color:white" onclick="closeModal()">Batal</button>
    </div>
</div>

<script>
/** CORE SCRIPT V8.0 **/
let db = JSON.parse(localStorage.getItem('db_loker_v8')) || [];
let stats = JSON.parse(localStorage.getItem('stats_loker_v8')) || { clicks: 0 };
let adsState = {};
let isAdmin = false;

function renderUser() {
    const grid = document.getElementById('lokerGrid');
    if(!grid) return;
    grid.innerHTML = "";
    db.forEach(item => {
        const hasAds = adsState[item.id] || false;
        grid.innerHTML += `
            <div class="job-card">
                <h3 class="job-title">${item.pos}</h3>
                <p class="job-meta">🏢 ${item.comp}</p>
                <p class="job-meta">📍 ${item.loc}</p>
                <p class="job-salary">Rp ${parseInt(item.sal).toLocaleString('id-ID')}</p>
                <div class="desc-wrapper">
                    <div class="desc-text collapsed">${item.desc}</div>
                </div>
                <button class="btn-wa" onclick="applyJob('${item.id}', '${item.wa}', '${item.pos}')">
                    ${hasAds ? 'Lanjut ke WhatsApp' : 'Lamar Sekarang'}
                </button>
            </div>`;
    });
}

function applyJob(id, wa, pos) {
    if (!adsState[id]) {
        window.open("https://tuxedoarbourannouncement.com/zhtirhypu?key=cc7341e331408d30ccf349b5b9539d67", '_blank');
        adsState[id] = true;
        renderUser();
    } else {
        window.open(`https://wa.me/${wa}?text=Saya melamar posisi ${encodeURIComponent(pos)}`, '_blank');
        stats.clicks++;
        const idx = db.findIndex(x => x.id == id);
        if(idx !== -1) db[idx].clicks = (db[idx].clicks || 0) + 1;
        localStorage.setItem('db_loker_v8', JSON.stringify(db));
        localStorage.setItem('stats_loker_v8', JSON.stringify(stats));
    }
}

function runAI() {
    const raw = document.getElementById('aiRaw').value;
    if(!raw) return;
    const lines = raw.split('\n').map(l => l.trim()).filter(l => l !== "");
    document.getElementById('fPos').value = lines[0].toUpperCase();
    const sal = raw.match(/(\d[\d.]*[\d])/);
    if(sal) document.getElementById('fSalary').value = sal[0].replace(/\./g, '');
    const kota = raw.match(/(JAKARTA|SURABAYA|BANDUNG|MEDAN|BEKASI|TANGERANG|GADING|UTARA|SELATAN|PUSAT|TIMUR|BARAT|BOGOR|DEPOK)/i);
    if(kota) {
        const lineLoc = lines.find(l => l.toUpperCase().includes(kota[0].toUpperCase()));
        document.getElementById('fLoc').value = lineLoc || kota[0].toUpperCase();
    }
    const wa = raw.match(/(?:\+?62|08)\d{8,13}/);
    if(wa) {
        let n = wa[0].replace(/\D/g, '');
        document.getElementById('fWA').value = n.startsWith('0') ? '62' + n.substring(1) : n;
    }
    document.getElementById('fDesc').value = raw;
}

function saveJob() {
    const id = document.getElementById('fId').value;
    const data = {
        id: id || Date.now(),
        pos: document.getElementById('fPos').value,
        comp: document.getElementById('fComp').value,
        sal: document.getElementById('fSalary').value,
        loc: document.getElementById('fLoc').value,
        wa: document.getElementById('fWA').value,
        desc: document.getElementById('fDesc').value,
        clicks: id ? db.find(x => x.id == id).clicks : 0
    };
    if(id) {
        const idx = db.findIndex(x => x.id == id);
        db[idx] = data;
    } else {
        db.unshift(data);
    }
    localStorage.setItem('db_loker_v8', JSON.stringify(db));
    closeModal();
    location.reload();
}

function renderAdmin() {
    document.getElementById('cJobs').innerText = db.length;
    document.getElementById('cClicks').innerText = stats.clicks;
    const body = document.getElementById('adminTableBody');
    body.innerHTML = db.map(item => `
        <tr><td>${item.pos}</td><td>${item.clicks || 0}</td>
        <td><button onclick="editJob('${item.id}')" style="color:blue">Edit</button> | 
        <button onclick="deleteJob('${item.id}')" style="color:red">Hapus</button></td></tr>`).join('');
}

function editJob(id) {
    const item = db.find(x => x.id == id);
    document.getElementById('fId').value = item.id;
    document.getElementById('fPos').value = item.pos;
    document.getElementById('fComp').value = item.comp;
    document.getElementById('fSalary').value = item.sal;
    document.getElementById('fLoc').value = item.loc;
    document.getElementById('fWA').value = item.wa;
    document.getElementById('fDesc').value = item.desc;
    openModal();
}

function deleteJob(id) {
    if(confirm("Hapus?")) {
        db = db.filter(x => x.id != id);
        localStorage.setItem('db_loker_v8', JSON.stringify(db));
        renderAdmin();
    }
}

function searchJobs() {
    const qJ = document.getElementById('sJob').value.toLowerCase();
    const qL = document.getElementById('sLoc').value.toLowerCase();
    const filtered = db.filter(i => i.pos.toLowerCase().includes(qJ) && i.loc.toLowerCase().includes(qL));
    const grid = document.getElementById('lokerGrid');
    grid.innerHTML = "";
    filtered.forEach(item => {
        grid.innerHTML += `<div class="job-card"><h3>${item.pos}</h3><p>${item.comp}</p><p>${item.loc}</p><p>Rp ${parseInt(item.sal).toLocaleString()}</p><button class="btn-wa" onclick="applyJob('${item.id}', '${item.wa}', '${item.pos}')">Lamar</button></div>`;
    });
}

let cCount = 0;
function adminCounter() {
    cCount++;
    if(cCount === 9) {
        if(prompt("Pass:") === "admin123") {
            isAdmin = true;
            document.getElementById('userView').style.display = 'none';
            document.getElementById('adminArea').style.display = 'block';
            renderAdmin();
        }
        cCount = 0;
    }
}

function switchTab(t) {
    document.getElementById('t-stats').classList.add('hidden');
    document.getElementById('t-manage').classList.add('hidden');
    document.getElementById('n-stats').classList.remove('active');
    document.getElementById('n-manage').classList.remove('active');
    document.getElementById('t-'+t).classList.remove('hidden');
    document.getElementById('n-'+t).classList.add('active');
}

function openModal() { document.getElementById('jobModal').style.display = 'block'; }
function closeModal() { document.getElementById('jobModal').style.display = 'none'; }
function toggleTheme() { document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'); }

window.addEventListener('load', renderUser);
</script>
</body>
</html>

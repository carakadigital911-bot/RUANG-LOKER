<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOKERINDO PRO V9 | Clean & Professional</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --border: #334155;
            --primary: #6366f1; --accent: #10b981; --text: #f8fafc;
            --text-dim: #94a3b8; --danger: #f43f5e;
        }
        [data-theme="light"] {
            --bg: #f1f5f9; --card: #ffffff; --border: #e2e8f0;
            --text: #1e293b; --text-dim: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; min-height: 100vh; }

        /* HEADER */
        header {
            background: var(--card); padding: 1rem 8%; display: flex; 
            justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }
        .logo { cursor: pointer; user-select: none; }
        .logo h1 { font-size: 1.5rem; font-weight: 800; color: var(--primary); }

        /* HERO SECTION */
        .hero { padding: 3rem 8%; text-align: center; }
        .search-grid { 
            display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 12px; 
            margin: 2rem auto; max-width: 1000px; background: var(--card);
            padding: 1rem; border-radius: 16px; border: 1px solid var(--border);
        }

        /* LOKER GRID */
        .loker-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; padding: 1rem 8% 5rem; 
        }
        .job-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 20px; 
            padding: 24px; transition: 0.3s; display: flex; flex-direction: column;
        }
        .job-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .job-title { font-size: 1.25rem; font-weight: 800; margin-bottom: 8px; }
        .job-salary { color: var(--accent); font-weight: 700; margin-bottom: 15px; }

        /* ADMIN WRAPPER */
        #viewAdmin { display: none; padding: 2rem 8%; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .tab-link { padding: 10px 20px; cursor: pointer; color: var(--text-dim); border-radius: 8px; font-weight: 600; }
        .tab-link.active { background: var(--primary); color: white; }

        /* FORM & INPUT */
        .input-box { 
            width: 100%; background: var(--bg); border: 1px solid var(--border); 
            padding: 12px; border-radius: 10px; color: var(--text); outline: none; margin-bottom: 15px;
        }
        .ai-assist-box { 
            background: rgba(99, 102, 241, 0.05); border: 2px dashed var(--primary); 
            padding: 20px; border-radius: 16px; margin-bottom: 20px;
        }

        /* BUTTONS */
        .btn { 
            padding: 12px 24px; border-radius: 12px; font-weight: 700; border: none; 
            cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-p { background: var(--primary); color: white; }
        .btn-wa { background: #22c55e; color: white; text-decoration: none; justify-content: center; width: 100%; margin-top: auto; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

        /* MODAL */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            z-index: 1000; padding: 2rem; overflow-y: auto; backdrop-filter: blur(5px);
        }
        .modal-content { 
            background: var(--card); max-width: 750px; margin: auto; 
            padding: 2.5rem; border-radius: 24px; border: 1px solid var(--border);
        }

        .hidden { display: none !important; }
        @media (max-width: 768px) {
            .search-grid { grid-template-columns: 1fr; }
            header, .hero, .loker-grid, #viewAdmin { padding-left: 5%; padding-right: 5%; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="adminCounter()">
        <h1 id="webTitle">LOKERINDO.PRO</h1>
    </div>
    <button class="btn btn-outline" onclick="toggleTheme()">🌓 Theme</button>
</header>

<!-- VIEW USER -->
<div id="viewUser">
    <section class="hero">
        <h2 style="font-size: 2.5rem; margin-bottom: 10px;">Temukan Peluang Karirmu</h2>
        <p style="color: var(--text-dim);">Portal lowongan kerja paling update dan terverifikasi AI.</p>
        
        <div class="search-grid">
            <input type="text" id="sPos" class="input-box" style="margin:0;" placeholder="Posisi Pekerjaan...">
            <select id="sLoc" class="input-box" style="margin:0;"><option value="">Pilih Lokasi</option></select>
            <select id="sCat" class="input-box" style="margin:0;"><option value="">Kategori</option></select>
            <button class="btn btn-p" onclick="app.filter()">Cari Loker</button>
        </div>
    </section>

    <main id="lokerGrid" class="loker-grid"></main>
</div>

<!-- VIEW ADMIN -->
<div id="viewAdmin">
    <div class="admin-header">
        <h2>Panel Kendali Admin</h2>
        <button class="btn btn-outline" style="color: var(--danger);" onclick="logout()">Keluar</button>
    </div>

    <div class="admin-tabs">
        <div class="tab-link active" onclick="switchTab(event, 'admJobs')">Manajemen Loker</div>
        <div class="tab-link" onclick="switchTab(event, 'admStats')">Statistik</div>
        <div class="tab-link" onclick="switchTab(event, 'admSettings')">Pengaturan Web</div>
    </div>

    <div id="admJobs" class="admin-tab-content">
        <button class="btn btn-p" style="margin-bottom: 20px;" onclick="openForm()">+ Tambah Loker Baru</button>
        <div style="overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead style="color: var(--text-dim); border-bottom: 1px solid var(--border);">
                    <tr><th style="padding: 10px;">Posisi</th><th style="padding: 10px;">Klik</th><th style="padding: 10px;">Aksi</th></tr>
                </thead>
                <tbody id="adminTable"></tbody>
            </table>
        </div>
    </div>

    <div id="admStats" class="admin-tab-content hidden">
        <div style="height: 300px;"><canvas id="chartAdmin"></canvas></div>
    </div>

    <div id="admSettings" class="admin-tab-content hidden">
        <div style="max-width: 500px;">
            <label>Nama Website</label><input type="text" id="cfgTitle" class="input-box">
            <label>Link Iklan Adsterra</label><input type="text" id="cfgAds" class="input-box">
            <button class="btn btn-p" onclick="saveSettings()">Simpan Perubahan</button>
        </div>
    </div>
</div>

<!-- MODAL FORM LOKER -->
<div id="jobModal" class="modal">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem;">
            <h3>✨ AI Job Assistant</h3>
            <button onclick="closeModal()" style="background:none; border:none; color:var(--text); cursor:pointer; font-size:1.5rem;">&times;</button>
        </div>

        <div class="ai-assist-box">
            <label style="font-weight: 800; font-size: 0.8rem;">PASTE TEKS DARI WA/FB DI SINI:</label>
            <textarea id="aiRaw" class="input-box" rows="4" style="margin-top:10px;" placeholder="Tempel di sini..."></textarea>
            <button class="btn btn-p" style="width:100%; justify-content: center;" onclick="runAI()">🪄 Rapikan & Isi Otomatis</button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <input type="text" id="fPos" class="input-box" placeholder="Posisi Pekerjaan">
            <input type="text" id="fComp" class="input-box" placeholder="Nama Perusahaan">
            <input type="number" id="fSal" class="input-box" placeholder="Gaji (Nominal)">
            <input type="text" id="fWA" class="input-box" placeholder="WhatsApp (62...)">
        </div>
        <textarea id="fDesc" class="input-box" rows="6" placeholder="Deskripsi (Akan dirapikan AI)"></textarea>
        
        <button class="btn btn-p" style="width: 100%; padding: 15px;" onclick="saveLoker()">Posting Lowongan Sekarang</button>
    </div>
</div>

<script>
/** 
 * LOKERINDO CORE ENGINE V9.0 
 */
let isAdmin = false;
let adsTrack = {};

const app = {
    db: JSON.parse(localStorage.getItem('v9_db')) || [
        { id: 1, pos: "Fullstack Developer", comp: "Tech Indo", sal: 15000000, wa: "6281234567", desc: "• Menguasai React & Node.js\n• Pengalaman 2 tahun", clicks: 0, time: Date.now() }
    ],
    cfg: JSON.parse(localStorage.getItem('v9_cfg')) || { title: "LOKERINDO.PRO", ads: "https://tuxedoarbourannouncement.com/zhtirhypu?key=cc7341e331408d30ccf349b5b9539d67" },

    init() {
        document.getElementById('webTitle').innerText = this.cfg.title;
        this.render();
    },

    render() {
        const grid = document.getElementById('lokerGrid');
        grid.innerHTML = this.db.map(l => `
            <div class="job-card">
                <div class="job-title">${l.pos}</div>
                <p style="color:var(--text-dim); margin-bottom:5px;">🏢 ${l.comp}</p>
                <div class="job-salary">Rp ${l.sal.toLocaleString('id-ID')}</div>
                <div style="white-space:pre-line; color:var(--text-dim); font-size:0.9rem; margin-bottom:20px;">${l.desc.substring(0, 150)}...</div>
                <button class="btn btn-wa" onclick="app.apply(${l.id})">
                    ${adsTrack[l.id] ? 'Lanjut ke WhatsApp' : 'Lamar Sekarang'}
                </button>
            </div>
        `).join('');

        if(isAdmin) this.renderAdmin();
    },

    apply(id) {
        if(!adsTrack[id]) {
            window.open(this.cfg.ads, '_blank');
            adsTrack[id] = true;
            this.render();
        } else {
            const item = this.db.find(x => x.id == id);
            item.clicks++;
            localStorage.setItem('v9_db', JSON.stringify(this.db));
            window.open(`https://wa.me/${item.wa}?text=Saya melamar posisi ${item.pos}`, '_blank');
        }
    },

    renderAdmin() {
        const table = document.getElementById('adminTable');
        table.innerHTML = this.db.map(l => `
            <tr style="border-bottom: 1px solid var(--border);">
                <td style="padding:12px;">${l.pos}</td>
                <td style="padding:12px;">${l.clicks} Klik</td>
                <td style="padding:12px;"><button onclick="app.del(${l.id})" style="color:red; cursor:pointer; background:none; border:none;">Hapus</button></td>
            </tr>
        `).join('');
    },

    del(id) {
        if(confirm("Hapus?")) {
            this.db = this.db.filter(x => x.id != id);
            localStorage.setItem('v9_db', JSON.stringify(this.db));
            this.render();
        }
    }
};

// AI LOGIC
function runAI() {
    const raw = document.getElementById('aiRaw').value;
    if(!raw) return;
    
    // Auto-formatting (Rasa AI)
    let clean = raw.trim().replace(/\s\s+/g, ' ');
    document.getElementById('fPos').value = clean.split('\n')[0].toUpperCase().substring(0, 30);
    
    let desc = clean.replace(/([.!?])\s*(?=[A-Z])/g, "$1\n• ");
    document.getElementById('fDesc').value = "• " + desc;
    
    const wa = raw.match(/(\d{10,13})/);
    if(wa) document.getElementById('fWA').value = wa[0].startsWith('0') ? '62' + wa[0].substring(1) : wa[0];
    
    alert("AI berhasil merapikan data!");
}

function saveLoker() {
    const job = {
        id: Date.now(),
        pos: document.getElementById('fPos').value,
        comp: document.getElementById('fComp').value,
        sal: parseInt(document.getElementById('fSal').value) || 0,
        wa: document.getElementById('fWA').value,
        desc: document.getElementById('fDesc').value,
        clicks: 0, time: Date.now()
    };
    app.db.unshift(job);
    localStorage.setItem('v9_db', JSON.stringify(app.db));
    location.reload();
}

// ADMIN SECURITY
let clicks = 0;
function adminCounter() {
    clicks++;
    if(clicks === 9) {
        if(prompt("Admin Key:") === "admin123") {
            isAdmin = true;
            document.getElementById('viewUser').style.display = 'none';
            document.getElementById('viewAdmin').style.display = 'block';
            app.render();
        }
        clicks = 0;
    }
}

function switchTab(e, id) {
    document.querySelectorAll('.admin-tab-content').forEach(t => t.classList.add('hidden'));
    document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
    document.getElementById(id).classList.remove('hidden');
    e.target.classList.add('active');
}

function saveSettings() {
    app.cfg.title = document.getElementById('cfgTitle').value;
    app.cfg.ads = document.getElementById('cfgAds').value;
    localStorage.setItem('v9_cfg', JSON.stringify(app.cfg));
    location.reload();
}

function logout() { location.reload(); }
function openForm() { document.getElementById('jobModal').style.display = 'block'; }
function closeModal() { document.getElementById('jobModal').style.display = 'none'; }
function toggleTheme() {
    const b = document.documentElement;
    b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>

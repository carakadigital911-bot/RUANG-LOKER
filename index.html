<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOKERINDO PRO V8 | Dual-Vision AI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        :root {
            --bg: #0a0a0c; --glass: rgba(18, 18, 23, 0.85);
            --card: #16161e; --border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1; --primary-glow: rgba(99, 102, 241, 0.3);
            --accent: #10b981; --text: #ffffff; --text-dim: #94a3b8;
            --radius: 20px;
        }
        [data-theme="light"] {
            --bg: #f8fafc; --glass: rgba(255, 255, 255, 0.85);
            --card: #ffffff; --border: rgba(0, 0, 0, 0.05);
            --text: #0f172a; --text-dim: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; transition: 0.4s; min-height: 100vh; }

        header {
            position: sticky; top: 0; z-index: 1000; background: var(--glass); 
            backdrop-filter: blur(15px); padding: 1rem 8%; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        .logo h1 { font-weight: 800; font-size: 1.5rem; background: linear-gradient(90deg, var(--primary), #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }

        /* USER UI (LOCKED) */
        .loker-grid { padding: 1rem 8% 5rem; display: grid; gap: 2rem; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .job-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 2rem; position: relative; transition: 0.4s; display: flex; flex-direction: column; }
        .job-card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .desc-container { position: relative; margin: 1.5rem 0; font-size: 0.95rem; line-height: 1.7; color: var(--text-dim); flex-grow: 1; }
        .desc-content.collapsed { max-height: 120px; overflow: hidden; -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%); }
        .btn-readmore { background: none; border: none; color: var(--primary); font-weight: 700; cursor: pointer; font-size: 0.9rem; margin-top: 10px; display: none; }
        .desc-content.collapsed + .btn-readmore { display: block; }
        .btn { padding: 12px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; text-decoration: none; }
        .btn-wa { background: #22c55e; color: white; width: 100%; margin-top: auto; }
        .btn-wa.ads-pending { background: #fbbf24; color: #000; animation: bounce 0.5s infinite alternate; }

        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.03); } }

        /* ADMIN PANEL */
        .admin-panel { background: var(--card); border: 1px solid var(--primary); border-radius: var(--radius); padding: 2rem; margin: 2rem 8%; display: none; }

        /* MODAL DUAL VISION */
        .modal { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); padding: 1.5rem; overflow-y: auto; }
        .modal-content { background: var(--card); max-width: 700px; margin: auto; border-radius: 24px; padding: 2rem; border: 1px solid var(--border); }
        
        .vision-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 1.5rem; }
        .vision-box { background: rgba(99, 102, 241, 0.05); border: 2px dashed var(--primary); padding: 1rem; border-radius: 15px; text-align: center; }
        .vision-box p { font-size: 0.7rem; margin-bottom: 8px; font-weight: 600; color: var(--text-dim); }
        
        .input-box { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: var(--text); outline: none; margin-bottom: 10px; }
        .ocr-status { font-size: 0.7rem; color: var(--accent); margin-top: 5px; font-weight: bold; display: none; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="adminCounter()"><h1>LOKERINDO.PRO</h1></div>
    <button class="btn" style="background: var(--card)" onclick="toggleTheme()">🌓</button>
</header>

<div id="adminArea" class="admin-panel">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>🔐 Management Control</h2>
        <button class="btn" onclick="logout()">Logout</button>
    </div>
    <div style="margin-top: 2rem;">
        <button class="btn btn-wa" style="width: auto;" onclick="openModal()">+ Buat Loker Baru</button>
    </div>
</div>

<main id="lokerGrid" class="loker-grid"></main>

<!-- MODAL DUAL VISION -->
<div id="jobModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-bottom: 15px;">🚀 Dual-Vision AI Assistant</h3>
        
        <div class="vision-grid">
            <!-- Scan 1: Header Info -->
            <div class="vision-box">
                <p>SCAN 1: INFO UTAMA<br>(Judul, Gaji, WA)</p>
                <input type="file" id="ocrMain" accept="image/*" class="hidden" onchange="processOCR(this, 'main')">
                <button class="btn btn-primary" style="width: 100%; font-size: 0.7rem;" onclick="document.getElementById('ocrMain').click()">📸 Scan Info</button>
                <div id="statusMain" class="ocr-status">Scanning... <span id="percMain">0%</span></div>
            </div>
            
            <!-- Scan 2: Description Append -->
            <div class="vision-box" style="border-color: var(--accent);">
                <p>SCAN 2: DESKRIPSI<br>(Tambah teks di bawah)</p>
                <input type="file" id="ocrDesc" accept="image/*" class="hidden" onchange="processOCR(this, 'desc')">
                <button class="btn" style="width: 100%; font-size: 0.7rem; background: var(--accent); color: white;" onclick="document.getElementById('ocrDesc').click()">📸 Scan Deskripsi</button>
                <div id="statusDesc" class="ocr-status">Scanning... <span id="percDesc">0%</span></div>
            </div>
        </div>

        <input type="text" id="fPos" class="input-box" placeholder="Posisi Pekerjaan">
        <input type="text" id="fComp" class="input-box" placeholder="Nama Perusahaan">
        <input type="text" id="fWA" class="input-box" placeholder="WhatsApp (62...)">
        <textarea id="fDesc" class="input-box" rows="8" placeholder="Hasil Scan Deskripsi akan muncul di sini..."></textarea>
        
        <div style="display: flex; gap: 10px; margin-top: 1rem;">
            <button class="btn btn-primary" style="flex: 1" onclick="app.save()">Publish Loker</button>
            <button class="btn" style="background:var(--bg)" onclick="closeModal()">Batal</button>
        </div>
    </div>
</div>

<script>
/** 
 * CORE V8.0
 */
let isAdmin = false;
const ADS_LINK = "https://tuxedoarbourannouncement.com/zhtirhypu?key=cc7341e331408d30ccf349b5b9539d67";

const app = {
    db: JSON.parse(localStorage.getItem('loker_v8_db')) || [],
    adsState: {},

    init() {
        this.render();
    },

    render() {
        const grid = document.getElementById('lokerGrid');
        if(!grid) return;
        grid.innerHTML = "";
        this.db.forEach((item) => {
            const hasClickedAds = this.adsState[item.id] || false;
            grid.innerHTML += `
                <div class="job-card">
                    <h2 style="font-size:1.4rem;">${item.pos}</h2>
                    <p style="color:var(--text-dim);">🏢 ${item.comp}</p>
                    <div class="desc-container">
                        <div class="desc-content collapsed" id="desc-${item.id}">${item.desc.replace(/\n/g, '<br>')}</div>
                        <button class="btn-readmore" onclick="toggleReadMore(${item.id})">Lihat selengkapnya...</button>
                    </div>
                    <button id="btn-wa-${item.id}" class="btn btn-wa ${hasClickedAds ? 'ads-pending' : ''}" onclick="app.handleApply('${item.id}', '${item.wa}', '${item.pos}')">
                        ${!hasClickedAds ? 'Lamar Sekarang' : 'Lanjut ke WhatsApp'}
                    </button>
                </div>`;
        });
    },

    handleApply(id, wa, pos) {
        if (!this.adsState[id]) {
            window.open(ADS_LINK, '_blank');
            this.adsState[id] = true;
            this.render();
        } else {
            window.open(`https://wa.me/${wa}?text=Saya melamar loker ${encodeURIComponent(pos)}`, '_blank');
        }
    },

    save() {
        const item = { 
            id: Date.now(), 
            pos: document.getElementById('fPos').value, 
            comp: document.getElementById('fComp').value, 
            wa: document.getElementById('fWA').value, 
            desc: document.getElementById('fDesc').value, 
            time: Date.now() 
        };
        this.db.unshift(item);
        localStorage.setItem('loker_v8_db', JSON.stringify(this.db));
        closeModal();
        this.render();
    }
};

/** DUAL VISION ENGINE **/
async function processOCR(input, mode) {
    if (!input.files || !input.files[0]) return;
    
    const status = document.getElementById(mode === 'main' ? 'statusMain' : 'statusDesc');
    const perc = document.getElementById(mode === 'main' ? 'percMain' : 'percDesc');
    status.style.display = 'block';

    try {
        const worker = await Tesseract.createWorker({
            logger: m => { if(m.status === 'recognizing text') perc.innerText = Math.round(m.progress * 100) + '%'; }
        });
        await worker.loadLanguage('ind+eng');
        await worker.initialize('ind+eng');
        const { data: { text } } = await worker.recognize(input.files[0]);
        await worker.terminate();

        if (mode === 'main') {
            // INFO UTAMA: Mengisi Judul dan WhatsApp
            const lines = text.split('\n').filter(l => l.trim().length > 3);
            document.getElementById('fPos').value = lines[0] ? lines[0].toUpperCase() : "";
            const waMatch = text.match(/(?:\+62|62|0)8\d{8,11}/);
            if(waMatch) {
                let n = waMatch[0].replace(/\D/g, '');
                document.getElementById('fWA').value = n.startsWith('0') ? '62' + n.substring(1) : n;
            }
        } else {
            // DESKRIPSI: Append (Menambah di bawah tanpa hapus yang lama)
            const currentDesc = document.getElementById('fDesc').value;
            const newText = text.trim();
            document.getElementById('fDesc').value = currentDesc ? currentDesc + "\n\n" + newText : newText;
        }

        status.innerText = "✅ Selesai!";
    } catch (e) {
        alert("Gagal memproses gambar.");
        status.style.display = 'none';
    }
}

let clickCount = 0;
function adminCounter() {
    clickCount++;
    if(clickCount === 9) {
        if(prompt("Password:") === "admin123") {
            isAdmin = true;
            document.getElementById('adminArea').style.display = 'block';
            app.render();
        }
        clickCount = 0;
    }
}

function toggleReadMore(id) {
    const el = document.getElementById(`desc-${id}`);
    el.classList.toggle('collapsed');
}

function logout() { location.reload(); }
function openModal() { document.getElementById('jobModal').style.display = 'block'; }
function closeModal() { 
    document.getElementById('jobModal').style.display = 'none'; 
    document.querySelectorAll('.modal input, .modal textarea').forEach(i => i.value = "");
}
function toggleTheme() {
    document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>

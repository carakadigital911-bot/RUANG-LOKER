<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOKERINDO PRO | Global Career Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #0a0a0c; --glass: rgba(18, 18, 23, 0.85);
            --card: #16161e; --border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1; --primary-glow: rgba(99, 102, 241, 0.3);
            --accent: #10b981; --text: #ffffff; --text-dim: #94a3b8;
            --radius: 20px;
        }

        [data-theme="light"] {
            --bg: #f8fafc; --glass: rgba(255, 255, 255, 0.85);
            --card: #ffffff; --border: rgba(0, 0, 0, 0.05);
            --text: #0f172a; --text-dim: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; transition: 0.4s; min-height: 100vh; }

        header {
            position: sticky; top: 0; z-index: 1000; background: var(--glass); 
            backdrop-filter: blur(15px); padding: 1rem 8%; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        .logo { cursor: pointer; user-select: none; }
        .logo h1 { font-weight: 800; font-size: 1.5rem; background: linear-gradient(90deg, var(--primary), #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* HERO & SEARCH STANDAR INTERNASIONAL */
        .hero { padding: 4rem 8% 2rem; text-align: center; background: radial-gradient(circle at top right, var(--primary-glow), transparent); }
        .hero h2 { font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem; letter-spacing: -1px; }
        .hero p { color: var(--text-dim); margin-bottom: 3rem; font-size: 1.1rem; }

        .search-container { 
            display: flex; background: var(--card); padding: 8px; border-radius: 100px;
            border: 1px solid var(--border); max-width: 900px; margin: 0 auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .search-container input { 
            flex: 1; background: transparent; border: none; padding: 15px 25px;
            color: var(--text); outline: none; font-size: 1rem;
        }
        .search-container .divider { width: 1px; background: var(--border); margin: 10px 0; }
        .btn-search { background: var(--primary); color: white; border: none; padding: 0 35px; border-radius: 100px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-search:hover { background: var(--primary-hover); transform: scale(1.05); }

        /* GRID LOKER */
        .loker-grid { padding: 3rem 8% 5rem; display: grid; gap: 2rem; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        .job-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 24px; 
            padding: 2rem; position: relative; transition: 0.4s; display: flex; flex-direction: column;
        }
        .job-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 20px 40px -15px var(--primary-glow); }
        
        .badge-new { background: linear-gradient(90deg, #f43f5e, #fbbf24); color: white; font-size: 0.65rem; font-weight: 800; padding: 4px 10px; border-radius: 30px; margin-bottom: 1rem; width: fit-content; }
        .job-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 5px; }
        .job-salary { font-size: 1rem; color: var(--accent); font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 6px; }
        .job-company { color: var(--text-dim); font-size: 0.95rem; display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }

        /* BUTTONS */
        .btn { padding: 12px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; text-decoration: none; }
        .btn-wa { background: #22c55e; color: white; margin-top: auto; }
        .btn-wa.ads-pending { background: #fbbf24; color: #000; animation: bounce 0.5s infinite alternate; }

        /* ADMIN AREA */
        .admin-panel { background: var(--card); border: 1px solid var(--primary); border-radius: var(--radius); padding: 2rem; margin: 2rem 8%; display: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; }
        .stat-item { background: var(--bg); padding: 1.5rem; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
        
        .modal { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); padding: 2rem; }
        .modal-content { background: var(--card); max-width: 600px; margin: auto; border-radius: 24px; padding: 2.5rem; border: 1px solid var(--border); overflow-y: auto; max-height: 90vh; }
        .input-box { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: var(--text); outline: none; margin-bottom: 10px; }

        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.05); } }
        @media (max-width: 768px) {
            .search-container { flex-direction: column; border-radius: 20px; padding: 15px; }
            .search-container .divider { display: none; }
            .btn-search { padding: 15px; margin-top: 10px; }
            header { padding: 1rem 5%; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="adminCounter()">
        <h1>LOKERINDO.PRO</h1>
    </div>
    <button class="btn" style="background: var(--card)" onclick="toggleTheme()">🌓</button>
</header>

<div class="hero">
    <h2>Temukan Karir Impianmu</h2>
    <p>Portal lowongan kerja terupdate di seluruh Indonesia</p>
    
    <div class="search-container">
        <input type="text" id="searchJob" placeholder="Posisi Pekerjaan...">
        <div class="divider"></div>
        <input type="text" id="searchLoc" placeholder="Lokasi (Kota/Provinsi)...">
        <button class="btn-search" onclick="app.search()">Cari Loker</button>
    </div>
</div>

<div id="adminArea" class="admin-panel">
    <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem;">
        <h2>📊 Analytics</h2>
        <button class="btn" style="background: var(--card)" onclick="logout()">Close</button>
    </div>
    <div class="stats-grid">
        <div class="stat-item"><p>Total Loker</p><h3 id="countJobs">0</h3></div>
        <div class="stat-item"><p>Visitors</p><h3 id="countVisitors">0</h3></div>
        <div class="stat-item"><p>WA Clicks</p><h3 id="countClicks">0</h3></div>
    </div>
    <div style="margin-top: 2rem; display: flex; gap: 10px;">
        <button class="btn" style="background:var(--primary); color:white" onclick="openModal()">+ Tambah Loker</button>
    </div>
</div>

<main id="lokerGrid" class="loker-grid"></main>

<!-- MODAL INPUT -->
<div id="jobModal" class="modal">
    <div class="modal-content">
        <h3>Input Lowongan Kerja</h3><br>
        <input type="text" id="fPos" class="input-box" placeholder="Posisi (Contoh: UI/UX Designer)">
        <input type="text" id="fComp" class="input-box" placeholder="Nama Perusahaan">
        <input type="number" id="fSalary" class="input-box" placeholder="Nominal Gaji (Contoh: 5000000)">
        <input type="text" id="fLoc" class="input-box" placeholder="Lokasi">
        <input type="text" id="fWA" class="input-box" placeholder="WhatsApp (62...)">
        <textarea id="fDesc" class="input-box" rows="4" placeholder="Deskripsi..."></textarea>
        <div style="display: flex; gap: 10px; margin-top: 1rem;">
            <button class="btn" style="background:var(--primary); color:white; flex: 1" onclick="app.save()">Terbitkan</button>
            <button class="btn" style="background:var(--bg)" onclick="closeModal()">Batal</button>
        </div>
    </div>
</div>

<script>
let isAdmin = false;
const ADS_LINK = "https://tuxedoarbourannouncement.com/zhtirhypu?key=cc7341e331408d30ccf349b5b9539d67";

const app = {
    db: JSON.parse(localStorage.getItem('loker_v5_db')) || [
        { id: 1, pos: "Senior Web Developer", comp: "Tech Global Hub", sal: 12000000, loc: "Jakarta", wa: "62812345678", time: Date.now(), desc: "Menguasai React, Node.js, dan cloud computing." },
        { id: 2, pos: "Graphic Designer", comp: "Creative Studio", sal: 6500000, loc: "Bandung", wa: "62898765432", time: Date.now() - 3600000, desc: "Bisa Adobe Illustrator dan Figma." }
    ],
    stats: JSON.parse(localStorage.getItem('loker_v5_stats')) || { visitors: 0, clicks: 0, daily: {} },
    adsState: {},

    init() {
        this.trackVisitor();
        this.render();
    },

    trackVisitor() {
        if (!sessionStorage.getItem('visited')) {
            this.stats.visitors++;
            sessionStorage.setItem('visited', 'true');
            this.saveStats();
        }
    },

    saveStats() { localStorage.setItem('loker_v5_stats', JSON.stringify(this.stats)); },

    formatRp(num) {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
    },

    render(data = this.db) {
        const grid = document.getElementById('lokerGrid');
        grid.innerHTML = "";
        const now = Date.now();

        data.forEach((item) => {
            const isNew = (now - item.time) < 86400000;
            const hasClickedAds = this.adsState[item.id] || false;
            
            grid.innerHTML += `
                <div class="job-card">
                    ${isNew ? '<span class="badge-new">NEW POST</span>' : ''}
                    <div class="job-title">${item.pos}</div>
                    <div class="job-company">🏢 ${item.comp} • 📍 ${item.loc}</div>
                    <div class="job-salary">💰 ${this.formatRp(item.sal || 0)}</div>
                    
                    <div style="font-size:0.9rem; color:var(--text-dim); margin-bottom:20px; line-height:1.6">
                        ${item.desc.substring(0, 100)}...
                    </div>

                    <button id="btn-wa-${item.id}" 
                            class="btn btn-wa ${hasClickedAds ? 'ads-pending' : ''}" 
                            onclick="app.handleApply('${item.id}', '${item.wa}', '${item.pos}')">
                        ${!hasClickedAds ? 'Lamar Sekarang' : 'Lanjut ke WhatsApp'}
                    </button>
                    ${isAdmin ? `<button class="btn" style="background:transparent; color:red; font-size:0.8rem; margin-top:10px" onclick="app.delete(${item.id})">Hapus</button>` : ''}
                </div>
            `;
        });
        if(isAdmin) {
            document.getElementById('countJobs').innerText = this.db.length;
            document.getElementById('countVisitors').innerText = this.stats.visitors;
            document.getElementById('countClicks').innerText = this.stats.clicks;
        }
    },

    handleApply(id, wa, pos) {
        if (!this.adsState[id]) {
            window.open(ADS_LINK, '_blank');
            this.adsState[id] = true;
            this.render();
        } else {
            window.open(`https://wa.me/${wa}?text=Halo%20saya%20ingin%20melamar%20${encodeURIComponent(pos)}`, '_blank');
            this.stats.clicks++;
            this.saveStats();
        }
    },

    search() {
        const qJob = document.getElementById('searchJob').value.toLowerCase();
        const qLoc = document.getElementById('searchLoc').value.toLowerCase();
        const res = this.db.filter(i => 
            i.pos.toLowerCase().includes(qJob) && i.loc.toLowerCase().includes(qLoc)
        );
        this.render(res);
    },

    save() {
        const newItem = {
            id: Date.now(),
            pos: document.getElementById('fPos').value,
            comp: document.getElementById('fComp').value,
            sal: parseInt(document.getElementById('fSalary').value),
            loc: document.getElementById('fLoc').value,
            wa: document.getElementById('fWA').value,
            desc: document.getElementById('fDesc').value,
            time: Date.now()
        };
        this.db.unshift(newItem);
        localStorage.setItem('loker_v5_db', JSON.stringify(this.db));
        closeModal();
        this.render();
    },

    delete(id) {
        if(confirm("Hapus?")) {
            this.db = this.db.filter(x => x.id != id);
            localStorage.setItem('loker_v5_db', JSON.stringify(this.db));
            this.render();
        }
    }
};

let clickCount = 0;
function adminCounter() {
    clickCount++;
    if(clickCount === 9) {
        if(prompt("Admin Password:") === "admin123") {
            isAdmin = true;
            document.getElementById('adminArea').style.display = 'block';
            app.render();
        }
        clickCount = 0;
    }
}

function logout() { location.reload(); }
function openModal() { document.getElementById('jobModal').style.display = 'block'; }
function closeModal() { document.getElementById('jobModal').style.display = 'none'; }
function toggleTheme() {
    const b = document.documentElement;
    b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>

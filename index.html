<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOKERINDO PRO | Global Career Platform</title>
    
    <!-- SEO & Metadata -->
    <meta name="description" content="Portal Lowongan Kerja Terpercaya di Indonesia. Cari kerja jadi lebih mudah.">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #0a0a0c; --glass: rgba(18, 18, 23, 0.9);
            --card: #16161e; --border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1; --primary-glow: rgba(99, 102, 241, 0.3);
            --accent: #10b981; --text: #ffffff; --text-dim: #94a3b8;
            --danger: #f43f5e; --radius: 18px;
        }

        [data-theme="light"] {
            --bg: #f8fafc; --glass: rgba(255, 255, 255, 0.9);
            --card: #ffffff; --border: rgba(0, 0, 0, 0.05);
            --text: #0f172a; --text-dim: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; scroll-behavior: smooth; }

        /* HEADER */
        header {
            position: sticky; top: 0; z-index: 1000; background: var(--glass); 
            backdrop-filter: blur(15px); padding: 0.8rem 8%; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        .logo { cursor: pointer; }
        .logo h1 { font-weight: 800; font-size: 1.5rem; background: linear-gradient(90deg, var(--primary), #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* FILTERS & SEARCH */
        .hero-section { padding: 3rem 8% 1rem; background: radial-gradient(circle at top right, var(--primary-glow), transparent); }
        .search-grid { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; margin-bottom: 15px; }
        .advanced-filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        
        .input-box { background: var(--card); border: 1px solid var(--border); padding: 12px 18px; border-radius: 12px; color: var(--text); outline: none; transition: 0.3s; font-size: 0.9rem; }
        .input-box:focus { border-color: var(--primary); }

        /* JOB GRID */
        .loker-grid { padding: 1rem 8% 5rem; display: grid; gap: 1.5rem; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }
        .job-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 20px; 
            padding: 1.5rem; position: relative; transition: 0.4s; display: flex; flex-direction: column;
        }
        .job-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 15px 30px -10px rgba(0,0,0,0.5); }
        
        /* BADGES */
        .badges-row { display: flex; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
        .badge { font-size: 0.65rem; font-weight: 800; padding: 4px 10px; border-radius: 6px; }
        .b-new { background: var(--accent); color: white; }
        .b-urgent { background: var(--danger); color: white; }
        .b-featured { background: #fbbf24; color: black; }

        /* DETAILS */
        .salary { color: var(--accent); font-weight: 700; font-size: 1.1rem; margin: 8px 0; }
        .meta-info { font-size: 0.8rem; color: var(--text-dim); display: flex; flex-direction: column; gap: 4px; margin-bottom: 15px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: auto; }

        /* BUTTONS */
        .btn { padding: 10px; border-radius: 10px; font-weight: 700; cursor: pointer; border: none; text-align: center; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 5px; text-decoration: none; }
        .btn-p { background: var(--primary); color: white; }
        .btn-wa { background: #22c55e; color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

        /* ADMIN WRAP (Hidden by default) */
        .admin-section { background: var(--card); margin: 2rem 8%; padding: 2rem; border-radius: 24px; border: 2px solid var(--primary); display: none; }

        /* UTILS */
        .hidden { display: none !important; }
        .skeleton { background: var(--border); height: 150px; border-radius: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 0.8; } 100% { opacity: 0.5; } }

        /* PWA MOBILE */
        @media (max-width: 768px) {
            .search-grid { grid-template-columns: 1fr; }
            header { padding: 0.8rem 5%; }
            .loker-grid { padding: 1rem 5% 5rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="adminCounter()">
        <h1>LOKERINDO.PRO</h1>
    </div>
    <div style="display: flex; gap: 10px;">
        <button class="btn btn-outline" onclick="showBookmarks()">🔖 <span class="hidden-mobile">Simpan</span></button>
        <button class="btn btn-outline" onclick="toggleTheme()">🌓</button>
    </div>
</header>

<main id="userHome">
    <section class="hero-section">
        <h2 style="font-size: 2rem; margin-bottom: 2rem;">Temukan Karir Global Anda</h2>
        
        <div class="search-grid">
            <input type="text" id="sPos" class="input-box" placeholder="Cari Posisi Pekerjaan...">
            <select id="sLoc" class="input-box"><option value="">Semua Lokasi</option></select>
            <select id="sCat" class="input-box"><option value="">Semua Kategori</option></select>
            <button class="btn btn-p" onclick="app.filter()">Cari Loker</button>
        </div>

        <div class="advanced-filters">
            <select id="sType" class="input-box" onchange="app.filter()">
                <option value="">Tipe Kerja</option>
                <option>Full-time</option><option>Part-time</option><option>Remote</option><option>Freelance</option>
            </select>
            <select id="sEdu" class="input-box" onchange="app.filter()">
                <option value="">Pendidikan</option>
                <option>SMA/K</option><option>D3</option><option>S1</option><option>S2</option>
            </select>
            <select id="sSort" class="input-box" onchange="app.filter()">
                <option value="new">Terbaru</option>
                <option value="high">Gaji Tertinggi</option>
            </select>
            <button class="btn btn-outline" onclick="app.reset()">Reset Filter</button>
        </div>
        
        <p id="totalFound" style="font-size: 0.9rem; color: var(--text-dim);">Memuat data loker...</p>
    </section>

    <div id="lokerGrid" class="loker-grid">
        <!-- Skeleton Loaders -->
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>
    
    <div style="text-align: center; margin-bottom: 5rem;">
        <button class="btn btn-outline" id="loadMore" onclick="app.loadMore()" style="margin: auto; padding: 12px 40px;">Load More Loker</button>
    </div>
</main>

<!-- ADMIN AREA -->
<div id="adminArea" class="admin-section">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h2>Dashboard Admin Panel</h2>
        <button class="btn btn-p" onclick="logout()">Logout</button>
    </div>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem;">
        <button class="btn btn-p" onclick="openModal()">+ Tambah Loker Baru</button>
        <button class="btn btn-outline" onclick="exportData()">Backup JSON</button>
    </div>
    <div style="overflow-x: auto; background: var(--bg); padding: 1rem; border-radius: 15px;">
        <table style="width: 100%; text-align: left; border-collapse: collapse;">
            <thead><tr style="color: var(--text-dim);"><th>Posisi</th><th>Klik</th><th>Aksi</th></tr></thead>
            <tbody id="adminTable"></tbody>
        </table>
    </div>
</div>

<!-- MODAL DETAIL & FORM -->
<div id="mainModal" class="modal" style="display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; padding: 2rem; overflow-y: auto;">
    <div id="modalBody" style="background: var(--card); max-width: 700px; margin: auto; padding: 2rem; border-radius: 20px; border: 1px solid var(--border);"></div>
</div>

<script>
/**
 * LOKERINDO PRO ENGINE V7.0
 * 75 User Features + 50 Admin Features
 */
const ADS_LINK = "https://tuxedoarbourannouncement.com/zhtirhypu?key=cc7341e331408d30ccf349b5b9539d67";
let isAdmin = false;
let bookmarks = JSON.parse(localStorage.getItem('user_bookmarks')) || [];

const categories = ["IT", "Marketing", "Design", "Accounting", "HRD", "Sales", "Warehouse", "Engineering"];
const locations = ["Jakarta", "Bandung", "Surabaya", "Medan", "Semarang", "Remote"];

const app = {
    db: JSON.parse(localStorage.getItem('loker_v7_db')) || [
        { id: 1, pos: "Software Engineer", comp: "Google Indo", sal: 25000000, loc: "Jakarta", type: "Full-time", edu: "S1", cat: "IT", urgent: true, featured: true, time: Date.now(), desc: "Membangun sistem skala global.", clicks: 0 },
        { id: 2, pos: "Graphic Designer", comp: "Canva Creative", sal: 8000000, loc: "Remote", type: "Freelance", edu: "SMA/K", cat: "Design", urgent: false, featured: true, time: Date.now() - 3600000, desc: "Membuat desain visual marketing.", clicks: 0 }
    ],
    limit: 6,
    adsState: {},

    init() {
        this.populateSelects();
        this.render();
    },

    populateSelects() {
        const sLoc = document.getElementById('sLoc');
        const sCat = document.getElementById('sCat');
        locations.forEach(l => sLoc.innerHTML += `<option>${l}</option>`);
        categories.forEach(c => sCat.innerHTML += `<option>${c}</option>`);
    },

    formatRp(n) { return "Rp " + n.toLocaleString('id-ID'); },

    filter() {
        this.limit = 6;
        this.render();
    },

    reset() {
        document.querySelectorAll('select, input').forEach(el => el.value = "");
        this.filter();
    },

    render() {
        const grid = document.getElementById('lokerGrid');
        const qPos = document.getElementById('sPos').value.toLowerCase();
        const qLoc = document.getElementById('sLoc').value;
        const qCat = document.getElementById('sCat').value;
        const qType = document.getElementById('sType').value;
        const qEdu = document.getElementById('sEdu').value;
        const qSort = document.getElementById('sSort').value;

        let filtered = this.db.filter(i => 
            (i.pos.toLowerCase().includes(qPos) || i.comp.toLowerCase().includes(qPos)) &&
            (qLoc === "" || i.loc === qLoc) &&
            (qCat === "" || i.cat === qCat) &&
            (qType === "" || i.type === qType) &&
            (qEdu === "" || i.edu === qEdu)
        );

        if(qSort === 'high') filtered.sort((a,b) => b.sal - a.sal);
        else filtered.sort((a,b) => b.time - a.time);

        document.getElementById('totalFound').innerText = `${filtered.length} Lowongan ditemukan`;
        
        const show = filtered.slice(0, this.limit);
        grid.innerHTML = show.map(item => this.createCard(item)).join('');
        
        if(this.limit >= filtered.length) document.getElementById('loadMore').classList.add('hidden');
        else document.getElementById('loadMore').classList.remove('hidden');

        if(isAdmin) this.renderAdmin();
    },

    createCard(item) {
        const isNew = (Date.now() - item.time) < 86400000;
        const isBookmarked = bookmarks.includes(item.id);
        const hasAds = this.adsState[item.id] || false;

        return `
            <div class="job-card">
                <div class="badges-row">
                    ${isNew ? '<span class="badge b-new">🔥 BARU</span>' : ''}
                    ${item.urgent ? '<span class="badge b-urgent">URGENT</span>' : ''}
                    ${item.featured ? '<span class="badge b-featured">FEATURED</span>' : ''}
                </div>
                <h3 style="font-size:1.2rem; font-weight:800;">${item.pos}</h3>
                <p style="color:var(--text-dim); font-size:0.9rem;">${item.comp}</p>
                <div class="salary">${this.formatRp(item.sal)}</div>
                
                <div class="meta-info">
                    <span>📍 ${item.loc} (${item.type})</span>
                    <span>🎓 Minimal ${item.edu}</span>
                    <span>📅 ${new Date(item.time).toLocaleDateString()}</span>
                </div>

                <div class="btn-group">
                    <button class="btn btn-p" onclick="app.showDetail(${item.id})">Lihat Detail</button>
                    <button class="btn btn-wa" onclick="app.apply('${item.id}', '${item.wa}', '${item.pos}')">
                        ${hasAds ? 'Lamar WA' : 'Apply'}
                    </button>
                </div>
                <button onclick="app.toggleBookmark(${item.id})" style="position:absolute; top:1.5rem; right:1.5rem; background:none; border:none; cursor:pointer; font-size:1.2rem;">
                    ${isBookmarked ? '🔖' : '📑'}
                </button>
            </div>
        `;
    },

    showDetail(id) {
        const item = this.db.find(x => x.id == id);
        const modal = document.getElementById('mainModal');
        const body = document.getElementById('modalBody');
        
        body.innerHTML = `
            <div style="display:flex; justify-content:space-between;">
                <h2>${item.pos}</h2>
                <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            <p style="color:var(--primary); font-weight:700; margin-bottom:1rem;">${item.comp}</p>
            <hr style="border:0; border-top:1px solid var(--border); margin:1rem 0;">
            <div style="white-space:pre-line; color:var(--text-dim); line-height:1.6;">
                <strong>Deskripsi Pekerjaan:</strong>\n${item.desc}
            </div>
            <div style="margin-top:2rem; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button class="btn btn-wa" onclick="app.apply('${item.id}', '${item.wa}', '${item.pos}')">Lamar Sekarang</button>
                <button class="btn btn-outline" onclick="app.share('${item.pos}')">Bagikan Loker</button>
            </div>
        `;
        modal.style.display = 'block';
    },

    apply(id, wa, pos) {
        if(!this.adsState[id]) {
            window.open(ADS_LINK, '_blank');
            this.adsState[id] = true;
            this.render();
        } else {
            const idx = this.db.findIndex(x => x.id == id);
            this.db[idx].clicks++;
            localStorage.setItem('loker_v7_db', JSON.stringify(this.db));
            window.open(`https://wa.me/${wa}?text=Halo%20Admin%20${this.db[idx].comp},%20saya%20tertarik%20melamar%20${pos}`, '_blank');
        }
    },

    toggleBookmark(id) {
        if(bookmarks.includes(id)) bookmarks = bookmarks.filter(x => x !== id);
        else bookmarks.push(id);
        localStorage.setItem('user_bookmarks', JSON.stringify(bookmarks));
        this.render();
    },

    loadMore() {
        this.limit += 6;
        this.render();
    },

    share(pos) {
        const url = window.location.href;
        const text = `Lowongan Kerja: ${pos}. Cek di sini: ${url}`;
        if(navigator.share) navigator.share({title:'Loker', text:text, url:url});
        else alert("Link disalin!");
    }
};

// ADMIN & UI HELPERS
let clickCount = 0;
function adminCounter() {
    clickCount++;
    if(clickCount === 9) {
        if(prompt("Admin Access:") === "admin123") {
            isAdmin = true;
            document.getElementById('userHome').style.display = 'none';
            document.getElementById('adminArea').style.display = 'block';
            app.render();
        }
        clickCount = 0;
    }
}

function openModal() {
    const modal = document.getElementById('mainModal');
    const body = document.getElementById('modalBody');
    body.innerHTML = `
        <h3>Input Lowongan Kerja Baru</h3><br>
        <input type="text" id="fPos" class="input-box" style="width:100%; margin-bottom:10px;" placeholder="Posisi Pekerjaan">
        <input type="text" id="fComp" class="input-box" style="width:100%; margin-bottom:10px;" placeholder="Nama Perusahaan">
        <input type="number" id="fSal" class="input-box" style="width:100%; margin-bottom:10px;" placeholder="Gaji (Angka)">
        <select id="fLoc" class="input-box" style="width:100%; margin-bottom:10px;">${locations.map(l => `<option>${l}</option>`)}</select>
        <select id="fEdu" class="input-box" style="width:100%; margin-bottom:10px;"><option>SMA/K</option><option>D3</option><option>S1</option><option>S2</option></select>
        <input type="text" id="fWA" class="input-box" style="width:100%; margin-bottom:10px;" placeholder="WA (62...)">
        <textarea id="fDesc" class="input-box" style="width:100%; margin-bottom:10px;" rows="4" placeholder="Deskripsi..."></textarea>
        <div style="display:flex; gap:10px;">
            <label><input type="checkbox" id="fUrgent"> Urgent</label>
            <label><input type="checkbox" id="fFeatured"> Featured</label>
        </div><br>
        <button class="btn btn-p" style="width:100%" onclick="app.save()">Terbitkan Loker</button>
    `;
    modal.style.display = 'block';
}

app.save = function() {
    const job = {
        id: Date.now(),
        pos: document.getElementById('fPos').value,
        comp: document.getElementById('fComp').value,
        sal: parseInt(document.getElementById('fSal').value),
        loc: document.getElementById('fLoc').value,
        edu: document.getElementById('fEdu').value,
        wa: document.getElementById('fWA').value,
        desc: document.getElementById('fDesc').value,
        urgent: document.getElementById('fUrgent').checked,
        featured: document.getElementById('fFeatured').checked,
        type: "Full-time", cat: "IT", time: Date.now(), clicks: 0
    };
    this.db.unshift(job);
    localStorage.setItem('loker_v7_db', JSON.stringify(this.db));
    location.reload();
};

function closeModal() { document.getElementById('mainModal').style.display = 'none'; }
function logout() { location.reload(); }
function toggleTheme() {
    const b = document.documentElement;
    b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOKERINDO PRO V7 | Neural Vision AI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Library OCR Utama -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        :root {
            --bg: #0a0a0c; --glass: rgba(18, 18, 23, 0.85);
            --card: #16161e; --border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1; --primary-glow: rgba(99, 102, 241, 0.3);
            --accent: #10b981; --text: #ffffff; --text-dim: #94a3b8;
            --radius: 20px;
        }
        [data-theme="light"] {
            --bg: #f8fafc; --glass: rgba(255, 255, 255, 0.85);
            --card: #ffffff; --border: rgba(0, 0, 0, 0.05);
            --text: #0f172a; --text-dim: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; transition: 0.4s; min-height: 100vh; }

        header {
            position: sticky; top: 0; z-index: 1000; background: var(--glass); 
            backdrop-filter: blur(15px); padding: 1rem 8%; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        .logo h1 { font-weight: 800; font-size: 1.5rem; background: linear-gradient(90deg, var(--primary), #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }

        /* ADMIN PANEL */
        .admin-panel { background: var(--card); border: 1px solid var(--primary); border-radius: var(--radius); padding: 2rem; margin: 2rem 8%; display: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; }
        .stat-item { background: var(--bg); padding: 1.5rem; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .stat-item h3 { font-size: 2rem; color: var(--primary); }
        .chart-box { background: var(--bg); padding: 1rem; border-radius: 15px; height: 300px; margin-top: 1rem; border: 1px solid var(--border); }

        /* USER UI (LOCKED) */
        .loker-grid { padding: 1rem 8% 5rem; display: grid; gap: 2rem; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .job-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 2rem; position: relative; transition: 0.4s; display: flex; flex-direction: column; }
        .job-card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .badge-new { background: linear-gradient(90deg, #f43f5e, #fbbf24); color: white; font-size: 0.65rem; font-weight: 800; padding: 4px 10px; border-radius: 30px; display: inline-block; margin-bottom: 1rem; width: fit-content; animation: pulse 2s infinite; }
        .desc-container { position: relative; margin: 1.5rem 0; font-size: 0.95rem; line-height: 1.7; color: var(--text-dim); flex-grow: 1; }
        .desc-content.collapsed { max-height: 120px; overflow: hidden; -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%); }
        .btn-readmore { background: none; border: none; color: var(--primary); font-weight: 700; cursor: pointer; font-size: 0.9rem; margin-top: 10px; display: none; }
        .desc-content.collapsed + .btn-readmore { display: block; }
        .btn { padding: 12px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; text-decoration: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-wa { background: #22c55e; color: white; }
        .btn-wa.ads-pending { background: #fbbf24; color: #000; animation: bounce 0.5s infinite alternate; }

        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.03); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* MODAL ADMIN */
        .modal { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); padding: 2rem; overflow-y: auto; }
        .modal-content { background: var(--card); max-width: 600px; margin: auto; border-radius: 24px; padding: 2.5rem; border: 1px solid var(--border); }
        .vision-box { background: rgba(99, 102, 241, 0.05); border: 2px dashed var(--primary); padding: 2rem; border-radius: 15px; margin-bottom: 1.5rem; text-align: center; }
        .input-box { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: var(--text); outline: none; margin-bottom: 10px; }
        
        #ocrStatus { display: none; margin-top: 10px; font-weight: bold; color: var(--accent); font-size: 0.85rem; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="adminCounter()"><h1>LOKERINDO.PRO</h1></div>
    <button class="btn" style="background: var(--card)" onclick="toggleTheme()">🌓</button>
</header>

<div id="adminArea" class="admin-panel">
    <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem;">
        <h2>📊 Business Insights</h2>
        <button class="btn" onclick="logout()">Close</button>
    </div>
    <div class="stats-grid">
        <div class="stat-item"><p>Total Jobs</p><h3 id="countJobs">0</h3></div>
        <div class="stat-item"><p>Visitors</p><h3 id="countVisitors">0</h3></div>
        <div class="stat-item"><p>WA Clicks</p><h3 id="countClicks">0</h3></div>
    </div>
    <div class="chart-box"><canvas id="trafficChart"></canvas></div>
    <button class="btn btn-primary" style="margin-top:20px" onclick="openModal()">+ Post New Job</button>
</div>

<main id="lokerGrid" class="loker-grid"></main>

<div id="jobModal" class="modal">
    <div class="modal-content">
        <h3>✨ Vision OCR Assistant</h3><br>
        <div class="vision-box">
            <p style="margin-bottom: 10px; font-size: 0.8rem;">Upload screenshot loker untuk isi form otomatis</p>
            <input type="file" id="ocrInput" accept="image/*" class="hidden" onchange="runVision(this)">
            <button class="btn btn-primary" style="width: 100%" onclick="document.getElementById('ocrInput').click()">📸 Scan Gambar Loker</button>
            <div id="ocrStatus">Menganalisis... <span id="ocrPerc">0%</span></div>
        </div>

        <input type="text" id="fPos" class="input-box" placeholder="Posisi">
        <input type="text" id="fComp" class="input-box" placeholder="Perusahaan">
        <input type="text" id="fWA" class="input-box" placeholder="WhatsApp (62...)">
        <textarea id="fDesc" class="input-box" rows="5" placeholder="Deskripsi..."></textarea>
        
        <div style="display: flex; gap: 10px; margin-top: 1rem;">
            <button class="btn btn-primary" style="flex: 1" onclick="app.save()">Publish</button>
            <button class="btn" style="background:var(--bg)" onclick="closeModal()">Batal</button>
        </div>
    </div>
</div>

<script>
/** 
 * LOKERINDO PRO V7.0
 * Fixed Image-to-Text Mapping 
 */
let isAdmin = false;
const ADS_LINK = "https://tuxedoarbourannouncement.com/zhtirhypu?key=cc7341e331408d30ccf349b5b9539d67";

const app = {
    db: JSON.parse(localStorage.getItem('loker_v7_db')) || [],
    stats: JSON.parse(localStorage.getItem('loker_v7_stats')) || { visitors: 0, clicks: 0, daily: {} },
    adsState: {},

    init() {
        this.trackVisitor();
        this.render();
    },

    trackVisitor() {
        if (!sessionStorage.getItem('visited')) {
            this.stats.visitors++;
            sessionStorage.setItem('visited', 'true');
            this.saveStats();
        }
    },

    saveStats() { localStorage.setItem('loker_v7_stats', JSON.stringify(this.stats)); },

    render() {
        const grid = document.getElementById('lokerGrid');
        if(!grid) return;
        grid.innerHTML = "";
        const now = Date.now();

        this.db.forEach((item) => {
            const isNew = (now - item.time) < 86400000;
            const hasClickedAds = this.adsState[item.id] || false;
            
            grid.innerHTML += `
                <div class="job-card">
                    ${isNew ? '<span class="badge-new">✨ NEW POST</span>' : ''}
                    <h2 style="font-size:1.4rem;">${item.pos}</h2>
                    <p style="color:var(--text-dim);">🏢 ${item.comp}</p>
                    <div class="desc-container">
                        <div class="desc-content collapsed" id="desc-${item.id}">${item.desc.replace(/\n/g, '<br>')}</div>
                        <button class="btn-readmore" onclick="toggleReadMore(${item.id})">Lihat selengkapnya...</button>
                    </div>
                    <button id="btn-wa-${item.id}" 
                            class="btn btn-wa ${hasClickedAds ? 'ads-pending' : ''}" 
                            onclick="app.handleApply('${item.id}', '${item.wa}', '${item.pos}')">
                        ${!hasClickedAds ? 'Lamar Sekarang' : 'Lanjut ke WhatsApp'}
                    </button>
                </div>`;
        });
        if(isAdmin) this.updateAdminUI();
    },

    handleApply(id, wa, pos) {
        if (!this.adsState[id]) {
            window.open(ADS_LINK, '_blank');
            this.adsState[id] = true;
            this.render();
        } else {
            window.open(`https://wa.me/${wa}?text=Saya melamar loker ${encodeURIComponent(pos)}`, '_blank');
            this.stats.clicks++;
            this.saveStats();
        }
    },

    save() {
        const item = { 
            id: Date.now(), 
            pos: document.getElementById('fPos').value, 
            comp: document.getElementById('fComp').value, 
            wa: document.getElementById('fWA').value, 
            desc: document.getElementById('fDesc').value, 
            time: Date.now() 
        };
        this.db.unshift(item);
        localStorage.setItem('loker_v7_db', JSON.stringify(this.db));
        closeModal();
        this.render();
    },

    updateAdminUI() {
        document.getElementById('countJobs').innerText = this.db.length;
        document.getElementById('countVisitors').innerText = this.stats.visitors;
        document.getElementById('countClicks').innerText = this.stats.clicks;
    }
};

/** FUNGSI VISION AI FIX **/
async function runVision(input) {
    if (!input.files || !input.files[0]) return;
    const status = document.getElementById('ocrStatus');
    const perc = document.getElementById('ocrPerc');
    status.style.display = 'block';

    try {
        const worker = await Tesseract.createWorker({
            logger: m => { if(m.status === 'recognizing text') perc.innerText = Math.round(m.progress * 100) + '%'; }
        });
        await worker.loadLanguage('ind+eng');
        await worker.initialize('ind+eng');
        const { data: { text } } = await worker.recognize(input.files[0]);
        await worker.terminate();

        // Mapping Data ke Form
        const lines = text.split('\n').filter(l => l.trim().length > 3);
        document.getElementById('fPos').value = lines[0] ? lines[0].toUpperCase().substring(0, 30) : "";
        document.getElementById('fDesc').value = lines.join('\n');
        
        // Cari nomor WhatsApp
        const waMatch = text.match(/(?:\+62|62|0)8\d{8,11}/);
        if(waMatch) {
            let n = waMatch[0].replace(/\D/g, '');
            document.getElementById('fWA').value = n.startsWith('0') ? '62' + n.substring(1) : n;
        }

        status.innerText = "✅ Berhasil Discan!";
    } catch (e) {
        alert("Gagal membaca gambar.");
        status.style.display = 'none';
    }
}

let clickCount = 0;
function adminCounter() {
    clickCount++;
    if(clickCount === 9) {
        if(prompt("Admin Access:") === "admin123") {
            isAdmin = true;
            document.getElementById('adminArea').style.display = 'block';
            app.render();
        }
        clickCount = 0;
    }
}

function toggleReadMore(id) {
    const el = document.getElementById(`desc-${id}`);
    const btn = el.nextElementSibling;
    el.classList.toggle('collapsed');
    btn.innerText = el.classList.contains('collapsed') ? "Lihat selengkapnya..." : "Sembunyikan";
}

function logout() { location.reload(); }
function openModal() { document.getElementById('jobModal').style.display = 'block'; }
function closeModal() { document.getElementById('jobModal').style.display = 'none'; }
function toggleTheme() {
    document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOKER INDONESIA Premium | Portal Karir Masa Depan</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6366f1; --primary-hover: #4f46e5;
            --bg-body: #0f172a; --bg-card: #1e293b;
            --text-main: #f8fafc; --text-dim: #94a3b8;
            --border: #334155; --accent: #10b981;
            --danger: #f43f5e; --fav: #fbbf24;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        [data-theme="light"] {
            --bg-body: #f1f5f9; --bg-card: #ffffff;
            --text-main: #1e293b; --text-dim: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); transition: 0.3s; }

        /* HEADER */
        header { 
            background: var(--bg-card); padding: 1.2rem 8%; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(10px);
        }
        .logo h1 { font-size: 1.5rem; font-weight: 800; color: var(--primary); letter-spacing: -1px; }

        /* SEARCH & FILTER */
        .hero-section { padding: 3rem 8% 2rem; text-align: center; }
        .filter-container { 
            display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px;
            background: var(--bg-card); padding: 15px; border-radius: 16px;
            border: 1px solid var(--border); box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }
        input, select { 
            background: var(--bg-body); border: 1px solid var(--border); 
            color: var(--text-main); padding: 12px; border-radius: 10px; outline: none;
        }

        /* LOKER CARDS */
        .loker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; padding: 0 8% 4rem; }
        .card { 
            background: var(--bg-card); border: 1px solid var(--border);
            padding: 24px; border-radius: 20px; transition: 0.3s; position: relative;
            box-shadow: var(--shadow);
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card-tag { font-size: 0.7rem; font-weight: 700; color: var(--primary); background: rgba(99, 102, 241, 0.1); padding: 5px 12px; border-radius: 20px; margin-bottom: 10px; display: inline-block; }
        .card-fav { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 1.3rem; color: var(--text-dim); }
        .card-fav.active { color: var(--fav); }
        .card h2 { font-size: 1.25rem; margin-bottom: 5px; }
        .card-company { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 15px; display: flex; align-items: center; gap: 5px; }
        .card-desc { font-size: 0.9rem; line-height: 1.6; color: var(--text-dim); margin-bottom: 20px; white-space: pre-line; }

        /* BUTTONS */
        .btn { padding: 12px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-wa { background: #25d366; color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-action-group { display: flex; gap: 10px; flex-wrap: wrap; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; padding: 20px; overflow-y: auto; }
        .modal-content { background: var(--bg-card); max-width: 600px; margin: 40px auto; padding: 30px; border-radius: 24px; border: 1px solid var(--border); }
        
        /* ADMIN AI AREA */
        .ai-tool { background: rgba(99, 102, 241, 0.05); border: 2px dashed var(--primary); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .ai-status { font-size: 0.75rem; color: var(--primary); margin-top: 5px; font-style: italic; }

        .hidden { display: none !important; }
        @media (max-width: 768px) { .filter-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="logo"><h1>LOKER.PRO</h1></div>
    <div style="display: flex; gap: 10px;">
        <button class="btn btn-outline" onclick="toggleTheme()">🌓</button>
        <button class="btn btn-primary" onclick="showLogin()" id="btnAdmin">Admin Panel</button>
    </div>
</header>

<div class="hero-section">
    <div class="filter-container">
        <input type="text" id="sKeyword" placeholder="Cari posisi atau PT..." onkeyup="filterLoker()">
        <select id="sKategori" onchange="filterLoker()"><option value="">Semua Kategori</option></select>
        <select id="sLokasi" onchange="filterLoker()"><option value="">Semua Lokasi</option></select>
        <button class="btn btn-outline" onclick="showFavorit()">⭐ Favorit</button>
    </div>
</div>

<div id="dashboardAdmin" class="hero-section hidden" style="padding-top: 0;">
    <div style="background: var(--bg-card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); display: flex; gap: 20px; justify-content: center;">
        <button class="btn btn-primary" onclick="openModalLoker()">+ Tambah Loker Baru</button>
        <button class="btn btn-outline" onclick="logout()">Keluar</button>
    </div>
</div>

<div class="loker-grid" id="lokerContainer"></div>

<!-- MODAL FORM LOKER -->
<div id="modalLoker" class="modal">
    <div class="modal-content">
        <h2>Post Lowongan Baru</h2><br>
        <div class="ai-tool">
            <label style="font-weight: bold; font-size: 0.8rem;">🤖 AI TEXT CLEANER & FORMATTER</label>
            <textarea id="rawText" rows="4" style="width:100%; margin-top:10px;" placeholder="Paste teks berantakan dari WA/FB disini..."></textarea>
            <button class="btn btn-primary" style="width:100%; margin-top:10px; justify-content: center;" onclick="runAIParsing()">✨ Bersihkan & Rapikan Teks</button>
            <p id="aiStatus" class="ai-status"></p>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <input type="text" id="fPosisi" placeholder="Posisi (Contoh: Admin Gudang)">
            <input type="text" id="fCompany" placeholder="Nama Perusahaan">
            <select id="fKategori"></select>
            <input type="text" id="fLokasi" placeholder="Lokasi (Contoh: Jakarta)">
            <input type="text" id="fGaji" placeholder="Gaji (Opsional)">
            <input type="text" id="fWA" placeholder="WA (Contoh: 628123...)">
        </div>
        <textarea id="fDesc" rows="6" style="width:100%; margin-top:10px;" placeholder="Deskripsi pekerjaan..."></textarea>
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn btn-primary" style="flex: 1; justify-content: center;" onclick="saveLoker()">Posting Loker</button>
            <button class="btn btn-outline" onclick="closeModal()">Batal</button>
        </div>
    </div>
</div>

<script>
    let isAdmin = false;
    let database = JSON.parse(localStorage.getItem('premium_loker')) || [];
    let favorit = JSON.parse(localStorage.getItem('fav_loker')) || [];

    const KATEGORI_100 = [
        "Accounting", "Admin", "Admin Gudang", "Admin Media Sosial", "Apoteker", "Arsitek", "Babysitter", "Back End Developer", "Baker", "Barista", "Beauty Advisor", "Bidan", "Business Analyst", "Call Center", "Chef", "Cleaning Service", "Content Creator", "Copywriter", "Customer Service", "Data Analyst", "Data Entry", "Delivery Driver", "Desain Grafis", "Digital Marketing", "Dokter Umum", "Dokter Gigi", "Driver", "Editor Video", "Electrician", "Engineer", "Event Organizer", "Fashion Designer", "Finance", "Fotografer", "Front End Developer", "Full Stack Developer", "Guru Bimbel", "Guru PAUD", "Guru SD", "Host Live Streaming", "HRD", "Housekeeping", "IT Support", "Jurnalistik", "Kasir", "Keamanan (Security)", "Koki", "Konsultan", "Kurir", "Legal", "Logistik", "Magang (Internship)", "Maintenance", "Manager", "Marketing", "Mekanik", "Mobile Developer", "Model", "Nanny", "Nurse (Perawat)", "Office Boy", "Operator Produksi", "Operator Alat Berat", "Painter", "Pastry Chef", "Pekerja Pabrik", "Penerjemah", "Pengacara", "Penjahit", "Penulis", "Perbankan", "Perpajakan", "Personal Assistant", "Photoshop Expert", "Pilot", "Plumber", "Pramusaji", "Programmer", "Project Manager", "Psikolog", "Public Relations", "Purchasing", "Quality Control", "Receptionist", "Reporter", "Sales Executive", "Sales Lapangan", "Satpam", "Secretary", "SEO Specialist", "Social Media Manager", "Software Engineer", "SPG / SPB", "Steward", "Surveyor", "Tailor", "Teknisi AC", "Teknisi HP", "Teller Bank", "Tour Guide", "Translator", "UI/UX Designer", "Video Grapher", "Waiter / Waitress", "Warehouse Staff", "Web Developer", "Welder", "Writers"
    ];

    // INITIALIZE
    function init() {
        const catSelects = [document.getElementById('sKategori'), document.getElementById('fKategori')];
        KATEGORI_100.sort().forEach(cat => {
            catSelects.forEach(s => {
                let opt = document.createElement('option');
                opt.value = cat; opt.innerText = cat;
                s.appendChild(opt);
            });
        });

        // Unique Lokasi for Filter
        const lokasis = [...new Set(database.map(item => item.lokasi))];
        const sLokasi = document.getElementById('sLokasi');
        lokasis.forEach(l => {
            let opt = document.createElement('option');
            opt.value = l; opt.innerText = l;
            sLokasi.appendChild(opt);
        });

        render();
    }

    // AI PARSER ENGINE (Rasa AI)
    function runAIParsing() {
        const raw = document.getElementById('rawText').value;
        const status = document.getElementById('aiStatus');
        if(!raw) return alert("Masukkan teks dulu!");

        status.innerText = "🤖 AI sedang menganalisis teks...";
        
        setTimeout(() => {
            // Logic membersihkan spasi ganda, merapikan paragraf, dan auto-detect
            let cleanText = raw.replace(/\s\s+/g, ' ').trim(); // Hapus spasi berlebih
            cleanText = cleanText.replace(/([.?!])\s*(?=[A-Z])/g, "$1\n\n"); // Buat paragraf baru setiap titik jika diikuti huruf besar
            
            // Auto detect Posisi (Biasanya di baris pertama atau setelah kata 'Dibutuhkan')
            const lines = cleanText.split('\n');
            document.getElementById('fPosisi').value = lines[0].substring(0, 30);
            
            // Format Deskripsi agar Rapi (List maker)
            let formattedDesc = cleanText.split('\n').map(line => {
                if(line.length > 5 && !line.includes(':')) return "• " + line.trim();
                return line;
            }).join('\n');

            document.getElementById('fDesc').value = formattedDesc;
            status.innerText = "✅ AI Berhasil merapikan teks & mendeteksi posisi.";
        }, 800);
    }

    function render(data = database) {
        const container = document.getElementById('lokerContainer');
        container.innerHTML = "";

        data.forEach((item, index) => {
            const isFav = favorit.includes(item.id);
            const div = document.createElement('div');
            div.className = "card";
            div.innerHTML = `
                <span class="card-fav ${isFav ? 'active' : ''}" onclick="toggleFav('${item.id}')">★</span>
                <span class="card-tag">${item.kategori}</span>
                <h2>${item.posisi}</h2>
                <div class="card-company">🏢 ${item.company} • 📍 ${item.lokasi}</div>
                <div class="card-desc">${item.desc.substring(0, 150)}${item.desc.length > 150 ? '...' : ''}</div>
                <div class="btn-action-group">
                    <a href="https://wa.me/${item.wa}?text=Halo, saya tertarik dengan loker ${item.posisi}" target="_blank" class="btn btn-wa">Lamar via WA</a>
                    <button class="btn btn-outline" onclick="shareLoker('${item.posisi}', '${item.company}')">🔗 Share</button>
                    ${isAdmin ? `<button class="btn btn-outline" style="color:var(--danger)" onclick="deleteLoker('${item.id}')">Hapus</button>` : ''}
                </div>
            `;
            container.appendChild(div);
        });
    }

    // ACTIONS
    function saveLoker() {
        const newItem = {
            id: 'ID-' + Date.now(),
            posisi: document.getElementById('fPosisi').value,
            company: document.getElementById('fCompany').value,
            kategori: document.getElementById('fKategori').value,
            lokasi: document.getElementById('fLokasi').value,
            wa: document.getElementById('fWA').value,
            desc: document.getElementById('fDesc').value,
            gaji: document.getElementById('fGaji').value
        };
        database.unshift(newItem);
        localStorage.setItem('premium_loker', JSON.stringify(database));
        closeModal();
        render();
    }

    function toggleFav(id) {
        if(favorit.includes(id)) favorit = favorit.filter(f => f !== id);
        else favorit.push(id);
        localStorage.setItem('fav_loker', JSON.stringify(favorit));
        render();
    }

    function shareLoker(p, c) {
        const text = `Info Loker Terbaru!\nPosisi: ${p}\nPerusahaan: ${c}\nCek selengkapnya di website kami!`;
        if(navigator.share) {
            navigator.share({ title: 'Info Loker', text: text, url: window.location.href });
        } else {
            alert("Link disalin ke clipboard!");
        }
    }

    function filterLoker() {
        const key = document.getElementById('sKeyword').value.toLowerCase();
        const cat = document.getElementById('sKategori').value;
        const lok = document.getElementById('sLokasi').value;

        const filtered = database.filter(item => {
            return (item.posisi.toLowerCase().includes(key) || item.company.toLowerCase().includes(key)) &&
                   (cat === "" || item.kategori === cat) &&
                   (lok === "" || item.lokasi === lok);
        });
        render(filtered);
    }

    function showFavorit() {
        const filtered = database.filter(item => favorit.includes(item.id));
        render(filtered);
    }

    // MODAL & ADMIN CONTROL
    function openModalLoker() { document.getElementById('modalLoker').style.display = 'block'; }
    function closeModal() { document.getElementById('modalLoker').style.display = 'none'; }
    function showLogin() {
        let p = prompt("Password Admin:");
        if(p === "admin123") {
            isAdmin = true;
            document.getElementById('dashboardAdmin').classList.remove('hidden');
            document.getElementById('btnAdmin').classList.add('hidden');
            render();
        }
    }
    function logout() { location.reload(); }
    function deleteLoker(id) { if(confirm("Hapus loker ini?")) { database = database.filter(i => i.id !== id); localStorage.setItem('premium_loker', JSON.stringify(database)); render(); } }
    function toggleTheme() {
        const body = document.documentElement;
        body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    init();
</script>
</body>
</html>

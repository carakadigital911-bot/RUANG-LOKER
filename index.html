<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOKER INDONESIA | Portal Lowongan Kerja Profesional</title>
    
    <!-- Link Chart.js untuk Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* --- CSS VARIABLES & THEMES --- */
        :root {
            --bg-primary: #0a0a0c;
            --bg-secondary: #121217;
            --bg-tertiary: #1c1c24;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #2d2d39;
            --card-bg: #121217;
            --success: #10b981;
            --danger: #f43f5e;
            --shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #2563eb;
            --border: #e2e8f0;
            --card-bg: #ffffff;
            --shadow: 0 10px 20px -5px rgba(0,0,0,0.05);
        }

        /* --- BASE STYLES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg-primary); 
            color: var(--text-primary); 
            line-height: 1.6; 
            transition: all 0.3s ease;
        }

        /* --- HEADER --- */
        header { 
            background: var(--bg-secondary); 
            padding: 1rem 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .logo-area h1 { 
            font-size: 1.5rem; 
            font-weight: 800; 
            background: linear-gradient(90deg, var(--accent), #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-btns { display: flex; gap: 1rem; align-items: center; }

        /* --- DASHBOARD --- */
        .dashboard { 
            background: var(--bg-secondary); 
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 3rem;
            box-shadow: var(--shadow);
        }
        .stats-row { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 1.5rem; 
        }
        .stat-box { 
            background: var(--bg-tertiary); 
            padding: 1.5rem; 
            border-radius: 12px; 
            border: 1px solid var(--border);
            text-align: center;
        }
        .stat-val { font-size: 2.5rem; font-weight: 800; color: var(--accent); }

        /* --- SEARCH & FILTERS --- */
        .filter-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        input, select, textarea {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.8rem 1.2rem;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }

        /* --- CARDS --- */
        .loker-grid { display: grid; gap: 1.5rem; }
        .loker-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 16px;
            transition: 0.3s;
            position: relative;
            box-shadow: var(--shadow);
        }
        .loker-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .badge { 
            font-size: 0.7rem; 
            font-weight: 700; 
            padding: 0.3rem 0.8rem; 
            border-radius: 6px; 
            text-transform: uppercase;
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            margin-bottom: 1rem;
            display: inline-block;
        }
        .card-title { font-size: 1.4rem; margin-bottom: 0.5rem; }
        .card-company { color: var(--text-secondary); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 5px; }

        /* --- BUTTONS --- */
        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: var(--bg-tertiary); }

        /* --- MODAL --- */
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(8px); 
            z-index: 2000;
            padding: 1rem;
        }
        .modal-content {
            background: var(--bg-secondary);
            max-width: 500px;
            margin: 5vh auto;
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            header { flex-direction: column; text-align: center; gap: 1rem; }
            .filter-container { flex-direction: column; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <h1>LOKER.ID</h1>
        <p style="font-size: 0.75rem; color: var(--text-secondary);">Portal Karir Terpercaya</p>
    </div>
    <div class="header-btns">
        <button class="btn btn-outline" onclick="toggleTheme()" id="themeBtn">🌙 Mode</button>
        <button class="btn btn-primary" onclick="showLogin()" id="adminEntryBtn">🔐 Admin</button>
    </div>
</header>

<main style="padding: 3rem 8%;">
    <!-- Dashboard Section -->
    <div id="adminDashboard" class="dashboard hidden">
        <h2 style="margin-bottom: 1.5rem;">Statistik Portal</h2>
        <div class="stats-row">
            <div class="stat-box"><div class="stat-val" id="countLoker">0</div><p>Total Loker</p></div>
            <div class="stat-box"><div class="stat-val" id="countKlik">0</div><p>Respon WA</p></div>
        </div>
        <div class="charts-grid">
            <div class="chart-container"><canvas id="chart1"></canvas></div>
        </div>
        <div style="margin-top: 1.5rem;">
            <button class="btn btn-primary" onclick="showForm()">+ Tambah Loker Baru</button>
            <button class="btn btn-outline" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- Search Section -->
    <div class="filter-container">
        <input type="text" id="keyword" placeholder="Cari posisi atau perusahaan..." style="flex: 2;" onkeyup="filterData()">
        <select id="catFilter" onchange="filterData()">
            <option value="">Semua Kategori</option>
            <option value="IT">Teknologi / IT</option>
            <option value="Admin">Administrasi</option>
            <option value="Sales">Marketing / Sales</option>
        </select>
    </div>

    <!-- List Section -->
    <div class="loker-grid" id="mainContainer">
        <!-- Content will be injected here -->
    </div>
</main>

<!-- LOGIN MODAL -->
<div id="modalLogin" class="modal">
    <div class="modal-content">
        <h2 style="margin-bottom: 1.5rem;">Admin Login</h2>
        <input type="password" id="adminPass" placeholder="Masukkan Password Admin" style="width:100%; margin-bottom:1rem;">
        <button class="btn btn-primary" style="width:100%;" onclick="doLogin()">Masuk Sekarang</button>
    </div>
</div>

<!-- FORM MODAL -->
<div id="modalForm" class="modal">
    <div class="modal-content">
        <h2 style="margin-bottom: 1rem;">Tambah Lowongan</h2>
        <textarea id="rawInput" placeholder="Paste teks mentah loker di sini..." rows="4" style="width:100%; margin-bottom:1rem;"></textarea>
        <button class="btn btn-outline" style="width:100%; margin-bottom:1rem;" onclick="smartParse()">✨ Auto-Fill Data</button>
        
        <input type="text" id="fPosisi" placeholder="Posisi Pekerjaan" style="width:100%; margin-bottom:0.8rem;">
        <input type="text" id="fCompany" placeholder="Nama Perusahaan" style="width:100%; margin-bottom:0.8rem;">
        <input type="text" id="fWA" placeholder="Nomor WhatsApp (628...)" style="width:100%; margin-bottom:1.5rem;">
        
        <button class="btn btn-primary" style="width:100%;" onclick="saveData()">Posting Sekarang</button>
    </div>
</div>

<script>
    let isAdmin = false;
    let database = JSON.parse(localStorage.getItem('portal_loker')) || [];

    // --- RENDER LOGIC ---
    function render(data = database) {
        const container = document.getElementById('mainContainer');
        if(data.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:5rem; color:var(--text-secondary);">Belum ada lowongan yang diposting.</div>`;
            return;
        }

        container.innerHTML = data.map((item, idx) => `
            <div class="loker-card">
                <span class="badge">Lowongan Terbaru</span>
                <h3 class="card-title">${item.posisi}</h3>
                <div class="card-company">🏢 ${item.perusahaan}</div>
                <div style="display:flex; gap:0.8rem;">
                    <a href="https://wa.me/${item.wa}?text=Halo%20saya%20tertarik%20dengan%20loker%20${item.posisi}" 
                       target="_blank" class="btn btn-primary" onclick="countKlik(${idx})">Lamar Sekarang</a>
                    ${isAdmin ? `<button class="btn btn-outline" style="color:var(--danger)" onclick="deleteData(${idx})">Hapus</button>` : ''}
                </div>
            </div>
        `).join('');
        
        document.getElementById('countLoker').innerText = database.length;
    }

    // --- CORE FUNCTIONS ---
    function doLogin() {
        if(document.getElementById('adminPass').value === "admin123") {
            isAdmin = true;
            document.getElementById('modalLogin').style.display = 'none';
            document.getElementById('adminDashboard').classList.remove('hidden');
            render();
        } else { alert('Akses Ditolak!'); }
    }

    function smartParse() {
        const text = document.getElementById('rawInput').value;
        if(!text) return;
        const lines = text.split('\n');
        document.getElementById('fPosisi').value = lines[0] || '';
        document.getElementById('fCompany').value = "Terdeteksi Otomatis";
        alert('AI telah mengisi data sementara!');
    }

    function saveData() {
        const payload = {
            posisi: document.getElementById('fPosisi').value,
            perusahaan: document.getElementById('fCompany').value,
            wa: document.getElementById('fWA').value,
            klik: 0,
            date: new Date().toLocaleDateString()
        };
        database.unshift(payload);
        localStorage.setItem('portal_loker', JSON.stringify(database));
        document.getElementById('modalForm').style.display = 'none';
        render();
    }

    function deleteData(i) {
        if(confirm('Hapus loker ini?')) {
            database.splice(i, 1);
            localStorage.setItem('portal_loker', JSON.stringify(database));
            render();
        }
    }

    function toggleTheme() {
        const curr = document.documentElement.getAttribute('data-theme');
        const next = curr === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        document.getElementById('themeBtn').innerText = next === 'dark' ? '🌙 Mode' : '☀️ Mode';
    }

    function filterData() {
        const key = document.getElementById('keyword').value.toLowerCase();
        const filtered = database.filter(item => 
            item.posisi.toLowerCase().includes(key) || 
            item.perusahaan.toLowerCase().includes(key)
        );
        render(filtered);
    }

    // --- MODAL TRIGGERS ---
    function showLogin() { document.getElementById('modalLogin').style.display = 'block'; }
    function showForm() { document.getElementById('modalForm').style.display = 'block'; }
    function logout() { location.reload(); }

    window.onclick = (e) => { if(e.target.className === 'modal') e.target.style.display = 'none'; }

    // Init
    document.addEventListener('DOMContentLoaded', () => render());
</script>
</body>
</html>

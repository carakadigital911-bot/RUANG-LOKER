<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOKERINDO PRO V5.2 | Monetized & Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #0a0a0c; --glass: rgba(18, 18, 23, 0.85);
            --card: #16161e; --border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1; --primary-glow: rgba(99, 102, 241, 0.3);
            --accent: #10b981; --text: #ffffff; --text-dim: #94a3b8;
            --radius: 20px;
        }

        [data-theme="light"] {
            --bg: #f8fafc; --glass: rgba(255, 255, 255, 0.85);
            --card: #ffffff; --border: rgba(0, 0, 0, 0.05);
            --text: #0f172a; --text-dim: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; transition: 0.4s; min-height: 100vh; }

        header {
            position: sticky; top: 0; z-index: 1000; background: var(--glass); 
            backdrop-filter: blur(15px); padding: 1rem 8%; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        .logo { cursor: pointer; user-select: none; }
        .logo h1 { font-weight: 800; font-size: 1.5rem; background: linear-gradient(90deg, var(--primary), #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .admin-panel { background: var(--card); border: 1px solid var(--primary); border-radius: var(--radius); padding: 2rem; margin: 2rem 8%; display: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-item { background: var(--bg); padding: 1.5rem; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .stat-item h3 { font-size: 2rem; color: var(--primary); }
        .chart-box { background: var(--bg); padding: 1rem; border-radius: 15px; height: 300px; margin-top: 1rem; border: 1px solid var(--border); }

        .loker-grid { padding: 1rem 8% 5rem; display: grid; gap: 2rem; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .job-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 24px; 
            padding: 2rem; position: relative; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; flex-direction: column;
        }
        .job-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 20px 40px -15px var(--primary-glow); }
        
        .badge-new { 
            background: linear-gradient(90deg, #f43f5e, #fbbf24); color: white; font-size: 0.65rem; 
            font-weight: 800; padding: 4px 10px; border-radius: 30px; display: inline-block; 
            margin-bottom: 1rem; width: fit-content; box-shadow: 0 0 15px rgba(244, 63, 94, 0.4); animation: pulse 2s infinite;
        }

        .job-date { font-size: 0.75rem; color: var(--text-dim); margin-top: 5px; }
        
        .desc-container { position: relative; margin: 1.5rem 0; font-size: 0.95rem; line-height: 1.7; color: var(--text-dim); flex-grow: 1; }
        .desc-content.collapsed { max-height: 120px; overflow: hidden; -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%); }
        .btn-readmore { background: none; border: none; color: var(--primary); font-weight: 700; cursor: pointer; font-size: 0.9rem; margin-top: 10px; display: none; }
        .desc-content.collapsed + .btn-readmore { display: block; }

        .btn { padding: 12px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; text-decoration: none; }
        .btn-primary { background: var(--primary); color: white; }
        
        /* Tombol Lamar Dinamis */
        .btn-wa { background: #22c55e; color: white; }
        .btn-wa.ads-pending { background: #fbbf24; color: #000; animation: bounce 0.5s infinite alternate; }

        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.03); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); } }

        .modal { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); padding: 2rem; }
        .modal-content { background: var(--card); max-width: 600px; margin: auto; border-radius: 24px; padding: 2.5rem; border: 1px solid var(--border); overflow-y: auto; max-height: 90vh; }
        
        .ai-box { background: rgba(99, 102, 241, 0.05); border: 2px dashed var(--primary); padding: 1.5rem; border-radius: 15px; margin-bottom: 1.5rem; }
        .input-box { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: var(--text); outline: none; margin-bottom: 10px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="logo" id="logoSecret" onclick="adminCounter()">
        <h1>LOKERINDO.PRO</h1>
    </div>
    <div style="display: flex; gap: 10px;">
        <button class="btn" style="background: var(--card)" onclick="toggleTheme()">🌓</button>
    </div>
</header>

<div id="adminArea" class="admin-panel">
    <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem;">
        <h2>📊 Business Insights</h2>
        <button class="btn" style="background: var(--card)" onclick="logout()">Close</button>
    </div>
    <div class="stats-grid">
        <div class="stat-item"><p style="color:var(--text-dim)">Total Jobs</p><h3 id="countJobs">0</h3></div>
        <div class="stat-item"><p style="color:var(--text-dim)">Visitors</p><h3 id="countVisitors">0</h3></div>
        <div class="stat-item"><p style="color:var(--text-dim)">WA Clicks</p><h3 id="countClicks">0</h3></div>
    </div>
    <div class="chart-box"><canvas id="trafficChart"></canvas></div>
    <div style="margin-top: 2rem; display: flex; gap: 10px;">
        <button class="btn btn-primary" onclick="openModal()">+ Post New Job</button>
    </div>
</div>

<main id="lokerGrid" class="loker-grid"></main>

<div id="jobModal" class="modal">
    <div class="modal-content">
        <h3>🪄 AI Job Formatter</h3><br>
        <div class="ai-box">
            <textarea id="rawText" class="input-box" rows="4" placeholder="Paste teks mentah..."></textarea>
            <button class="btn btn-primary" style="width: 100%" onclick="app.aiProcess()">✨ Bersihkan & Format</button>
        </div>
        <input type="text" id="fPos" class="input-box" placeholder="Posisi">
        <input type="text" id="fComp" class="input-box" placeholder="Perusahaan">
        <input type="text" id="fWA" class="input-box" placeholder="WA (62...)">
        <textarea id="fDesc" class="input-box" rows="5" placeholder="Deskripsi..."></textarea>
        <div style="display: flex; gap: 10px; margin-top: 1rem;">
            <button class="btn btn-primary" style="flex: 1" onclick="app.save()">Terbitkan</button>
            <button class="btn" style="background:var(--bg)" onclick="closeModal()">Batal</button>
        </div>
    </div>
</div>

<script>
let isAdmin = false;
const ADS_LINK = "https://tuxedoarbourannouncement.com/zhtirhypu?key=cc7341e331408d30ccf349b5b9539d67";

const dummyData = [
    { id: 101, pos: "UI/UX DESIGNER SENIOR", comp: "Creative Pixel Studio", wa: "6281234567890", time: Date.now(), desc: "• Pengalaman minimal 3 tahun.\n• Menguasai Figma, Adobe XD.\n• Mampu membuat prototipe interaktif." },
    { id: 102, pos: "SOCIAL MEDIA MANAGER", comp: "Digital Spark Agency", wa: "6281222333444", time: Date.now() - 3600000, desc: "• Mengelola TikTok & Instagram.\n• Menganalisis metrik mingguan.\n• Kolaborasi dengan influencer." },
    { id: 103, pos: "FRONTEND DEVELOPER (REACT)", comp: "Tech Solution", wa: "6281199887766", time: Date.now() - 86400000, desc: "• Mahir React.js & Next.js.\n• Pengalaman Tailwind CSS.\n• Integrasi REST API." },
    { id: 104, pos: "ADMIN GUDANG", comp: "PT. Maju Logistik", wa: "6281555666777", time: Date.now() - 172800000, desc: "• Pencatatan barang masuk/keluar.\n• Stock opname bulanan.\n• Menyiapkan resi pengiriman." }
];

const app = {
    db: JSON.parse(localStorage.getItem('loker_v5_db')) || dummyData,
    stats: JSON.parse(localStorage.getItem('loker_v5_stats')) || { visitors: 0, clicks: 0, daily: {} },
    adsState: {}, // Melacak status klik per ID loker

    init() {
        this.trackVisitor();
        this.render();
    },

    trackVisitor() {
        const today = new Date().toISOString().split('T')[0];
        if (!sessionStorage.getItem('visited')) {
            this.stats.visitors++;
            if(!this.stats.daily[today]) this.stats.daily[today] = {v:0, c:0};
            this.stats.daily[today].v++;
            sessionStorage.setItem('visited', 'true');
            this.saveStats();
        }
    },

    saveStats() { localStorage.setItem('loker_v5_stats', JSON.stringify(this.stats)); },

    render() {
        const grid = document.getElementById('lokerGrid');
        if(!grid) return;
        grid.innerHTML = "";
        const now = Date.now();

        this.db.forEach((item) => {
            const isNew = (now - item.time) < 86400000;
            const formattedDate = new Date(item.time).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
            const hasClickedAds = this.adsState[item.id] || false;
            
            grid.innerHTML += `
                <div class="job-card">
                    ${isNew ? '<span class="badge-new">✨ PREMIUM NEW</span>' : ''}
                    <h2 style="font-size:1.4rem;">${item.pos}</h2>
                    <p style="color:var(--text-dim); margin-bottom:5px;">🏢 ${item.comp}</p>
                    <div class="job-date">📅 Posted: ${formattedDate}</div>
                    
                    <div class="desc-container">
                        <div class="desc-content collapsed" id="desc-${item.id}">${item.desc.replace(/\n/g, '<br>')}</div>
                        <button class="btn-readmore" onclick="toggleReadMore(${item.id})">Tampilkan selengkapnya...</button>
                    </div>

                    <div style="display:flex; gap:10px; margin-top:auto;">
                        <button id="btn-wa-${item.id}" 
                                class="btn btn-wa ${!hasClickedAds ? '' : ''}" 
                                onclick="app.handleApply('${item.id}', '${item.wa}', '${item.pos}')">
                            ${!hasClickedAds ? 'Lamar Sekarang' : 'Lanjut ke WhatsApp'}
                        </button>
                        ${isAdmin ? `<button class="btn" style="background:var(--bg); color:red" onclick="app.delete(${item.id})">Hapus</button>` : ''}
                    </div>
                </div>
            `;
        });
        if(isAdmin) this.updateAdminUI();
    },

    handleApply(id, wa, pos) {
        if (!this.adsState[id]) {
            // KLIK PERTAMA: Buka Iklan
            window.open(ADS_LINK, '_blank');
            this.adsState[id] = true; // Tandai sudah klik iklan
            
            // Ubah tampilan tombol tanpa render ulang agar smooth
            const btn = document.getElementById(`btn-wa-${id}`);
            btn.innerText = "Lanjut ke WhatsApp";
            btn.classList.add('ads-pending');
        } else {
            // KLIK KEDUA: Buka WA & Track Stats
            const waUrl = `https://wa.me/${wa}?text=Halo%20saya%20tertarik%20dengan%20loker%20${encodeURIComponent(pos)}`;
            window.open(waUrl, '_blank');
            
            this.stats.clicks++;
            const today = new Date().toISOString().split('T')[0];
            if(!this.stats.daily[today]) this.stats.daily[today] = {v:0, c:0};
            this.stats.daily[today].c++;
            this.saveStats();
            
            // Opsional: Reset state setelah beberapa detik jika ingin iklan muncul lagi nanti
            // setTimeout(() => { this.adsState[id] = false; this.render(); }, 60000);
        }
    },

    aiProcess() {
        const raw = document.getElementById('rawText').value;
        if(!raw) return;
        let clean = raw.trim().replace(/\s\s+/g, ' ');
        clean = clean.split('\n').map(line => (line.length > 5 && !line.startsWith('•')) ? "• " + line.trim() : line).join('\n');
        document.getElementById('fPos').value = raw.split('\n')[0].substring(0, 35).toUpperCase();
        document.getElementById('fDesc').value = clean;
    },

    save() {
        const item = { id: Date.now(), pos: document.getElementById('fPos').value, comp: document.getElementById('fComp').value, wa: document.getElementById('fWA').value, desc: document.getElementById('fDesc').value, time: Date.now(), clicks: 0 };
        this.db.unshift(item);
        localStorage.setItem('loker_v5_db', JSON.stringify(this.db));
        closeModal();
        this.render();
    },

    delete(id) {
        if(confirm("Hapus loker?")) {
            this.db = this.db.filter(x => x.id != id);
            localStorage.setItem('loker_v5_db', JSON.stringify(this.db));
            this.render();
        }
    },

    updateAdminUI() {
        document.getElementById('countJobs').innerText = this.db.length;
        document.getElementById('countVisitors').innerText = this.stats.visitors;
        document.getElementById('countClicks').innerText = this.stats.clicks;
        this.drawChart();
    },

    drawChart() {
        const ctx = document.getElementById('trafficChart').getContext('2d');
        const days = Object.keys(this.stats.daily).slice(-7);
        if(window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: days,
                datasets: [
                    { label: 'Visitors', data: days.map(d => this.stats.daily[d].v), borderColor: '#6366f1', tension: 0.4 },
                    { label: 'Clicks', data: days.map(d => this.stats.daily[d].c), borderColor: '#10b981', tension: 0.4 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
};

let clickCount = 0;
function adminCounter() {
    clickCount++;
    if(clickCount === 9) {
        if(prompt("Admin Access:") === "admin123") {
            isAdmin = true;
            document.getElementById('adminArea').style.display = 'block';
            app.render();
        }
        clickCount = 0;
    }
}

function toggleReadMore(id) {
    const el = document.getElementById(`desc-${id}`);
    const btn = el.nextElementSibling;
    if(el.classList.contains('collapsed')) { el.classList.remove('collapsed'); btn.innerText = "Sembunyikan"; }
    else { el.classList.add('collapsed'); btn.innerText = "Tampilkan selengkapnya..."; }
}

function logout() { location.reload(); }
function openModal() { document.getElementById('jobModal').style.display = 'block'; }
function closeModal() { document.getElementById('jobModal').style.display = 'none'; }
function toggleTheme() {
    const b = document.documentElement;
    b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>

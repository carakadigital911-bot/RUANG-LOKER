<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOKERINDO PRO V8.2 | Triple-Field Vision AI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        /* CSS USER VIEW - DIKUNCI MATI (REFERENSI V5.2) */
        :root {
            --bg: #0a0a0c; --glass: rgba(18, 18, 23, 0.85);
            --card: #16161e; --border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1; --primary-glow: rgba(99, 102, 241, 0.3);
            --accent: #10b981; --text: #ffffff; --text-dim: #94a3b8;
            --radius: 20px;
        }
        [data-theme="light"] {
            --bg: #f8fafc; --glass: rgba(255, 255, 255, 0.85);
            --card: #ffffff; --border: rgba(0, 0, 0, 0.05);
            --text: #0f172a; --text-dim: #475569;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; transition: 0.4s; min-height: 100vh; }
        header { position: sticky; top: 0; z-index: 1000; background: var(--glass); backdrop-filter: blur(15px); padding: 1rem 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { cursor: pointer; user-select: none; }
        .logo h1 { font-weight: 800; font-size: 1.5rem; background: linear-gradient(90deg, var(--primary), #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .admin-panel { background: var(--card); border: 1px solid var(--primary); border-radius: var(--radius); padding: 2rem; margin: 2rem 8%; display: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-item { background: var(--bg); padding: 1.5rem; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .stat-item h3 { font-size: 2rem; color: var(--primary); }
        .chart-box { background: var(--bg); padding: 1rem; border-radius: 15px; height: 300px; margin-top: 1rem; border: 1px solid var(--border); }
        .loker-grid { padding: 1rem 8% 5rem; display: grid; gap: 2rem; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .job-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 2rem; position: relative; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; }
        .job-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 20px 40px -15px var(--primary-glow); }
        .badge-new { background: linear-gradient(90deg, #f43f5e, #fbbf24); color: white; font-size: 0.65rem; font-weight: 800; padding: 4px 10px; border-radius: 30px; display: inline-block; margin-bottom: 1rem; width: fit-content; box-shadow: 0 0 15px rgba(244, 63, 94, 0.4); animation: pulse 2s infinite; }
        .job-date { font-size: 0.75rem; color: var(--text-dim); margin-top: 5px; }
        .desc-container { position: relative; margin: 1.5rem 0; font-size: 0.95rem; line-height: 1.7; color: var(--text-dim); flex-grow: 1; }
        .desc-content.collapsed { max-height: 120px; overflow: hidden; -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%); }
        .btn-readmore { background: none; border: none; color: var(--primary); font-weight: 700; cursor: pointer; font-size: 0.9rem; margin-top: 10px; display: none; }
        .desc-content.collapsed + .btn-readmore { display: block; }
        .btn { padding: 12px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; text-decoration: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-wa { background: #22c55e; color: white; }
        .btn-wa.ads-pending { background: #fbbf24; color: #000; animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.03); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); } }

        /* MODAL ADMIN AREA */
        .modal { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); padding: 1.5rem; overflow-y: auto; }
        .modal-content { background: var(--card); max-width: 700px; margin: auto; border-radius: 24px; padding: 2rem; border: 1px solid var(--border); }
        .vision-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 1.5rem; }
        .vision-box { background: rgba(99, 102, 241, 0.05); border: 2px dashed var(--primary); padding: 1rem; border-radius: 15px; text-align: center; }
        .vision-box p { font-size: 0.7rem; margin-bottom: 8px; font-weight: 700; color: var(--primary); }
        .input-box { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: var(--text); outline: none; margin-bottom: 10px; }
        .ocr-loader { font-size: 0.7rem; color: var(--accent); margin-top: 5px; font-weight: bold; display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="logo" id="logoSecret" onclick="adminCounter()">
        <h1>LOKERINDO.PRO</h1>
    </div>
    <button class="btn" style="background: var(--card)" onclick="toggleTheme()">🌓</button>
</header>

<div id="adminArea" class="admin-panel">
    <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem;">
        <h2>📊 Business Insights</h2>
        <button class="btn" style="background: var(--card)" onclick="logout()">Close</button>
    </div>
    <div class="stats-grid">
        <div class="stat-item"><p style="color:var(--text-dim)">Total Jobs</p><h3 id="countJobs">0</h3></div>
        <div class="stat-item"><p style="color:var(--text-dim)">Visitors</p><h3 id="countVisitors">0</h3></div>
        <div class="stat-item"><p style="color:var(--text-dim)">WA Clicks</p><h3 id="countClicks">0</h3></div>
    </div>
    <div class="chart-box"><canvas id="trafficChart"></canvas></div>
    <div style="margin-top: 2rem; display: flex; gap: 10px;">
        <button class="btn btn-primary" onclick="openModal()">+ Post New Job</button>
    </div>
</div>

<main id="lokerGrid" class="loker-grid"></main>

<div id="jobModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-bottom: 15px;">🚀 Vision AI Formatter</h3>
        
        <div class="vision-grid">
            <div class="vision-box">
                <p>SCAN 1: INFO UTAMA<br>(Posisi, Gaji, Lokasi)</p>
                <input type="file" id="ocrMain" accept="image/*" class="hidden" onchange="runVision(this, 'main')">
                <button class="btn btn-primary" style="width: 100%; font-size: 0.75rem;" onclick="document.getElementById('ocrMain').click()">📷 Scan Info</button>
                <div id="loadMain" class="ocr-loader">Processing... <span id="percMain">0%</span></div>
            </div>
            <div class="vision-box" style="border-color: var(--accent);">
                <p>SCAN 2: DESKRIPSI<br>(Tambah tanpa hapus)</p>
                <input type="file" id="ocrDesc" accept="image/*" class="hidden" onchange="runVision(this, 'desc')">
                <button class="btn" style="width: 100%; font-size: 0.75rem; background: var(--accent); color: white;" onclick="document.getElementById('ocrDesc').click()">📷 Scan Deskripsi</button>
                <div id="loadDesc" class="ocr-loader">Processing... <span id="percDesc">0%</span></div>
            </div>
        </div>

        <input type="text" id="fPos" class="input-box" placeholder="Posisi Pekerjaan">
        <input type="text" id="fSalary" class="input-box" placeholder="Kisaran Gaji">
        <input type="text" id="fLoc" class="input-box" placeholder="Lokasi (Kota/Wilayah)">
        <input type="text" id="fComp" class="input-box" placeholder="Nama Perusahaan">
        <input type="text" id="fWA" class="input-box" placeholder="WhatsApp (Isi Manual: 62...)">
        <textarea id="fDesc" class="input-box" rows="6" placeholder="Hasil scan deskripsi..."></textarea>
        
        <div style="display: flex; gap: 10px; margin-top: 1rem;">
            <button class="btn btn-primary" style="flex: 1" onclick="app.save()">Terbitkan Loker</button>
            <button class="btn" style="background:var(--bg)" onclick="closeModal()">Batal</button>
        </div>
    </div>
</div>

<script>
/** LOKERINDO V8.2 **/
let isAdmin = false;
const ADS_LINK = "https://tuxedoarbourannouncement.com/zhtirhypu?key=cc7341e331408d30ccf349b5b9539d67";

const app = {
    db: JSON.parse(localStorage.getItem('loker_v82_db')) || [],
    stats: JSON.parse(localStorage.getItem('loker_v8_stats')) || { visitors: 0, clicks: 0, daily: {} },
    adsState: {},

    init() {
        this.trackVisitor();
        this.render();
    },

    trackVisitor() {
        if (!sessionStorage.getItem('visited')) {
            this.stats.visitors++;
            sessionStorage.setItem('visited', 'true');
            this.saveStats();
        }
    },

    saveStats() { localStorage.setItem('loker_v8_stats', JSON.stringify(this.stats)); },

    render() {
        const grid = document.getElementById('lokerGrid');
        if(!grid) return;
        grid.innerHTML = "";
        const now = Date.now();
        this.db.forEach((item) => {
            const isNew = (now - item.time) < 86400000;
            const hasClickedAds = this.adsState[item.id] || false;
            grid.innerHTML += `
                <div class="job-card">
                    ${isNew ? '<span class="badge-new">✨ PREMIUM NEW</span>' : ''}
                    <h2 style="font-size:1.4rem;">${item.pos}</h2>
                    <p style="color:var(--accent); font-weight:700; font-size:0.9rem;">💰 ${item.sal || '-'}</p>
                    <p style="color:var(--text-dim); font-size:0.85rem; margin-bottom:5px;">🏢 ${item.comp} • 📍 ${item.loc}</p>
                    <div class="desc-container">
                        <div class="desc-content collapsed" id="desc-${item.id}">${item.desc.replace(/\n/g, '<br>')}</div>
                        <button class="btn-readmore" onclick="toggleReadMore(${item.id})">Tampilkan selengkapnya...</button>
                    </div>
                    <div style="display:flex; gap:10px; margin-top:auto;">
                        <button id="btn-wa-${item.id}" class="btn btn-wa ${hasClickedAds ? 'ads-pending' : ''}" onclick="app.handleApply('${item.id}', '${item.wa}', '${item.pos}')">
                            ${!hasClickedAds ? 'Lamar Sekarang' : 'Lanjut ke WhatsApp'}
                        </button>
                        ${isAdmin ? `<button class="btn" style="background:var(--bg); color:red" onclick="app.delete(${item.id})">Hapus</button>` : ''}
                    </div>
                </div>`;
        });
        if(isAdmin) this.updateAdminUI();
    },

    handleApply(id, wa, pos) {
        if (!this.adsState[id]) {
            window.open(ADS_LINK, '_blank');
            this.adsState[id] = true;
            const btn = document.getElementById(`btn-wa-${id}`);
            btn.innerText = "Lanjut ke WhatsApp";
            btn.classList.add('ads-pending');
        } else {
            window.open(`https://wa.me/${wa}?text=Halo saya tertarik melamar loker ${encodeURIComponent(pos)}`, '_blank');
            this.stats.clicks++;
            this.saveStats();
        }
    },

    save() {
        const item = { 
            id: Date.now(), 
            pos: document.getElementById('fPos').value.toUpperCase(), 
            sal: document.getElementById('fSalary').value,
            loc: document.getElementById('fLoc').value,
            comp: document.getElementById('fComp').value, 
            wa: document.getElementById('fWA').value, 
            desc: document.getElementById('fDesc').value, 
            time: Date.now() 
        };
        this.db.unshift(item);
        localStorage.setItem('loker_v82_db', JSON.stringify(this.db));
        closeModal();
        this.render();
    },

    delete(id) {
        if(confirm("Hapus loker?")) {
            this.db = this.db.filter(x => x.id != id);
            localStorage.setItem('loker_v82_db', JSON.stringify(this.db));
            this.render();
        }
    },

    updateAdminUI() {
        document.getElementById('countJobs').innerText = this.db.length;
        document.getElementById('countVisitors').innerText = this.stats.visitors;
        document.getElementById('countClicks').innerText = this.stats.clicks;
    }
};

/** VISION ENGINE (TRIPLE-FIELD AUTOFILL) **/
async function runVision(input, mode) {
    if (!input.files || !input.files[0]) return;
    const loader = document.getElementById(mode === 'main' ? 'loadMain' : 'loadDesc');
    const perc = document.getElementById(mode === 'main' ? 'percMain' : 'percDesc');
    loader.style.display = 'block';

    try {
        const worker = await Tesseract.createWorker({
            logger: m => { if(m.status === 'recognizing text') perc.innerText = Math.round(m.progress * 100) + '%'; }
        });
        await worker.loadLanguage('ind+eng');
        await worker.initialize('ind+eng');
        const { data: { text } } = await worker.recognize(input.files[0]);
        await worker.terminate();

        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 3);

        if (mode === 'main') {
            // Mapping Info Utama
            document.getElementById('fPos').value = lines[0] ? lines[0].toUpperCase() : "";
            
            // Cari Baris Gaji (Mencari nominal jutaan/Rp)
            const salLine = lines.find(l => /(rp|gaji|jt|\d{6,})/i.test(l));
            if(salLine) document.getElementById('fSalary').value = salLine;

            // Cari Baris Lokasi (Mencari kata Jakarta, Gading, atau baris yang mengandung kota)
            const locLine = lines.find(l => /(jakarta|surabaya|bandung|medan|bekasi|tangerang|gading|utara|selatan|pusat|timur|barat|bogor|depok)/i.test(l));
            if(locLine) document.getElementById('fLoc').value = locLine;
        } else {
            // Append Deskripsi
            const old = document.getElementById('fDesc').value;
            document.getElementById('fDesc').value = old ? old + "\n\n" + text.trim() : text.trim();
        }
        loader.innerText = "✅ Done!";
    } catch (e) {
        alert("OCR Gagal.");
        loader.style.display = 'none';
    }
}

let clickCount = 0;
function adminCounter() {
    clickCount++;
    if(clickCount === 9) {
        if(prompt("Admin Access:") === "admin123") {
            isAdmin = true;
            document.getElementById('adminArea').style.display = 'block';
            app.render();
        }
        clickCount = 0;
    }
}

function toggleReadMore(id) {
    const el = document.getElementById(`desc-${id}`);
    const btn = el.nextElementSibling;
    el.classList.toggle('collapsed');
    btn.innerText = el.classList.contains('collapsed') ? "Tampilkan selengkapnya..." : "Sembunyikan";
}

function logout() { location.reload(); }
function openModal() { document.getElementById('jobModal').style.display = 'block'; }
function closeModal() { 
    document.getElementById('jobModal').style.display = 'none'; 
    document.querySelectorAll('.modal input, .modal textarea').forEach(i => i.value = "");
}
function toggleTheme() {
    document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>
